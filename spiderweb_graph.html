                        // Find point indices closest to fromNode and toNode
                        let fromIdx = 0, toIdx = pointCount - 1;
                        let bestFromDist = Infinity, bestToDist = Infinity;
                        for (let i = 0; i < pointCount; i++) {
                            const p = edgeRef.getPoint(i);
                            const df = Math.hypot(step.fromNode.x - p.x, step.fromNode.y - p.y);
                            const dt = Math.hypot(step.toNode.x - p.x, step.toNode.y - p.y);
                            if (df < bestFromDist) { bestFromDist = df; fromIdx = i; }
                            if (dt < bestToDist) { bestToDist = dt; toIdx = i; }
                        }

                        const dir = fromIdx < toIdx ? 1 : -1;
                        const stepCount = Math.abs(toIdx - fromIdx);

                        if (stepCount === 0) {
                            const p = edgeRef.getPoint(fromIdx);
                            this.x = p.x;
                            this.y = p.y;
                        } else {
                            let totalWalkDist = 0;
                            for (let i = fromIdx; i !== toIdx; i += dir) {
                                const p1 = edgeRef.getPoint(i);
                                const p2 = edgeRef.getPoint(i + dir);
                                totalWalkDist += Math.hypot(p2.x - p1.x, p2.y - p1.y);
                            }

                            const targetDist = this.walkStepProgress * totalWalkDist;
                            let accumulated = 0;
                            let placed = false;
                            for (let i = fromIdx; i !== toIdx; i += dir) {
                                const p1 = edgeRef.getPoint(i);
                                const p2 = edgeRef.getPoint(i + dir);
                                const segDist = Math.hypot(p2.x - p1.x, p2.y - p1.y);
                                if (accumulated + segDist >= targetDist) {
                                    const t = segDist > 0 ? (targetDist - accumulated) / segDist : 0;
                                    this.x = p1.x + (p2.x - p1.x) * t;
                                    this.y = p1.y + (p2.y - p1.y) * t;
                                    placed = true;
                                    break;
                                }
                                accumulated += segDist;
                            }
                            if (!placed) {
                                const p = edgeRef.getPoint(toIdx);
                                this.x = p.x;
                                this.y = p.y;
                            }
                        }

                        // Apply spider weight to nearest point
                        let closestIdx = fromIdx;
                        let closestDist = Infinity;
                        for (let i = Math.min(fromIdx, toIdx); i <= Math.max(fromIdx, toIdx); i++) {
                            const p = edgeRef.getPoint(i);
                            const d = Math.hypot(p.x - this.x, p.y - this.y);
                            if (d < closestDist) { closestDist = d; closestIdx = i; }
                        }
                        const closestP = edgeRef.getPoint(closestIdx);
                        if (!closestP.fixed) {
                            closestP.vy += this.weight;
                        }
                    } else {
                        // Branch or proximity: straight-line interpolation
                        const fromX = step.fromNode.x;
                        const fromY = step.fromNode.y;
                        const toX = step.toNode.x;
                        const toY = step.toNode.y;
                        this.x = fromX + (toX - fromX) * this.walkStepProgress;
                        this.y = fromY + (toY - fromY) * this.walkStepProgress;
                    }

                    // Grow spoke edge on timer, capped at 2x estimated distance
                    this.releaseTimer++;
                    if (this.spokeEdge) {
                        const spokeMaxSegs = Math.floor(this.spokeEdge.getStraightLength() * 4 / SPRING_NATURAL);
                        if (this.releaseTimer % 3 === 0 && this.spokeEdge.segments.length < spokeMaxSegs) {
                            this.spokeEdge.growFromB(this.x, this.y);
                        }
                        this.spokeEdge.nodeB.x = this.x;
                        this.spokeEdge.nodeB.y = this.y;
                    }

                } else if (this.state === 'tying_spoke_anchor') {
                    this.tyingTimer++;
                    this.legAnimation = Math.sin(this.tyingTimer * 0.2) * 0.5 + 0.5;
                    this.x = this.spokeAnchorPoint.x;
                    this.y = this.spokeAnchorPoint.y;

                    if (this.spokeEdge) {
                        this.spokeEdge.nodeB.x = this.x;
                        this.spokeEdge.nodeB.y = this.y;
                    }

                    if (this.tyingTimer > 60) {
                        this.tying = false;

                        if (this.spokeEdge) {
                            // If the spoke lands on a graph edge, split that edge and attach to it
                            if (this.spokeAnchorSourceType === 'edge' && this.spokeAnchorSource) {
                                const targetEdge = this.spokeAnchorSource;
                                // Check the edge still exists in the graph
                                if (webGraph.edges.includes(targetEdge)) {
                                    // Find the closest progress along the target edge
                                    let bestProgress = 0;
                                    let bestDist = Infinity;
                                    const totalPts = targetEdge.getPointCount();
                                    for (let i = 0; i < totalPts; i++) {
                                        const p = targetEdge.getPoint(i);
                                        const d = Math.hypot(p.x - this.spokeAnchorPoint.x, p.y - this.spokeAnchorPoint.y);
                                        if (d < bestDist) {
                                            bestDist = d;
                                            bestProgress = i / (totalPts - 1);
                                        }
                                    }
                                    // Split the target edge to create a junction node
                                    const splitResult = webGraph.splitEdge(targetEdge, bestProgress);
                                    const junctionNode = splitResult.newNode;

                                    // Replace spoke's nodeB with the junction node so they're
                                    // physically the same point - the spoke pulls on the thread
                                    const oldNodeB = this.spokeEdge.nodeB;
                                    // Remove spoke edge from old nodeB's edge list
                                    oldNodeB.edges = oldNodeB.edges.filter(e => e !== this.spokeEdge);
                                    // Remove old nodeB from graph if it has no edges
                                    if (oldNodeB.edges.length === 0) {
                                        const idx = webGraph.nodes.indexOf(oldNodeB);
                                        if (idx >= 0) webGraph.nodes.splice(idx, 1);
                                    }
                                    // Set spoke's nodeB to the junction node
                                    this.spokeEdge.nodeB = junctionNode;
                                    junctionNode.edges.push(this.spokeEdge);

                                    // Update anchor point to match actual position
                                    this.spokeAnchorPoint.x = junctionNode.x;
                                    this.spokeAnchorPoint.y = junctionNode.y;
                                } else {
                                    // Edge was already split/removed, find the nearest
                                    // existing node on any edge near the anchor point
                                    let nearestNode = null;
                                    let nearestDist = 30;
                                    for (const edge of webGraph.edges) {
                                        for (let i = 0; i < edge.getPointCount(); i++) {
                                            const p = edge.getPoint(i);
                                            if (p instanceof WebGraphNode) {
                                                const d = Math.hypot(p.x - this.spokeAnchorPoint.x, p.y - this.spokeAnchorPoint.y);
                                                if (d < nearestDist) {
                                                    nearestDist = d;
                                                    nearestNode = p;
                                                }
                                            }
                                        }
                                    }
                                    if (nearestNode) {
                                        // Attach to the nearest node
                                        const oldNodeB = this.spokeEdge.nodeB;
                                        oldNodeB.edges = oldNodeB.edges.filter(e => e !== this.spokeEdge);
                                        if (oldNodeB.edges.length === 0) {
                                            const idx = webGraph.nodes.indexOf(oldNodeB);
                                            if (idx >= 0) webGraph.nodes.splice(idx, 1);
                                        }
                                        this.spokeEdge.nodeB = nearestNode;
                                        nearestNode.edges.push(this.spokeEdge);
                                        this.spokeAnchorPoint.x = nearestNode.x;
                                        this.spokeAnchorPoint.y = nearestNode.y;
                                    } else {
                                        // Fallback: just fix in place
                                        this.spokeEdge.nodeB.x = this.spokeAnchorPoint.x;
                                        this.spokeEdge.nodeB.y = this.spokeAnchorPoint.y;
                                        this.spokeEdge.nodeB.fixed = true;
                                    }
                                }
                            } else {
                                // Branch anchor - just fix in place
                                this.spokeEdge.nodeB.x = this.spokeAnchorPoint.x;
                                this.spokeEdge.nodeB.y = this.spokeAnchorPoint.y;
                                this.spokeEdge.nodeB.fixed = true;
                            }
                        }

                        this.state = 'tensioning_spoke';
                        this.tyingTimer = 0;
                        this.tying = true;
                    }

                } else if (this.state === 'tensioning_spoke') {
                    this.tyingTimer++;
                    this.legAnimation = Math.sin(this.tyingTimer * 0.2) * 0.5 + 0.5;

                    this.x = this.spokeAnchorPoint.x;
                    this.y = this.spokeAnchorPoint.y;

                    if (!this.spokeEdge.tensionToTarget(targetTension, 'B')) {
                        this.tying = false;
                        this.state = 'walking_spoke_to_center';
                        this.walkProgress = 1.0;
                    }

                } else if (this.state === 'walking_spoke_to_center') {
                    this.walkProgress -= this.getWalkSpeedForEdge(this.spokeEdge);

                    if (this.walkProgress <= 0) {
                        this.walkProgress = 0;
                        this.x = this.hubNode.x;
                        this.y = this.hubNode.y;
                        this.state = 'tying_spoke_center';
                        this.tying = true;
                        this.tyingTimer = 0;
                    } else if (this.spokeEdge) {
                        this.walkOnEdge(this.spokeEdge, this.walkProgress);
                    }

                } else if (this.state === 'tying_spoke_center') {
                    this.tyingTimer++;
                    this.legAnimation = Math.sin(this.tyingTimer * 0.2) * 0.5 + 0.5;

                    this.x = this.hubNode.x;
                    this.y = this.hubNode.y;

                    if (this.tyingTimer > 60) {
                        this.tying = false;

                        const centerX = this.hubNode.x;
                        const centerY = this.hubNode.y;
                        const angle = Math.atan2(
                            this.spokeAnchorPoint.y - centerY,
                            this.spokeAnchorPoint.x - centerX
                        );
                        this.spokes.push({
                            edge: this.spokeEdge,
                            angle: angle,
                            anchorPoint: { ...this.spokeAnchorPoint }
                        });

                        this.spokeEdge = null;
                        this.spokeAnchorPoint = null;
                        this.spokeAnchorSource = null;
                        this.spokeAnchorSourceType = null;
                        this.spokeAnchorSegmentIndex = null;
                        this.waitTimer = 0;
                        this.state = 'spoke_pause';
                    }

                } else if (this.state === 'spoke_pause') {
                    this.x = this.hubNode.x;
                    this.y = this.hubNode.y;

                    this.waitTimer++;
                    if (this.waitTimer > 30) {
                        this.waitTimer = 0;
                        this.state = 'plan_next_spoke';
                    }

                } else if (this.state === 'all_spokes_complete') {
                    this.x = this.hubNode.x;
                    this.y = this.hubNode.y;
                }
            }

            attachThread3ToBridgeCenter() {
                if (this.thread3Edge && this.bridgeEdge) {
                    // Split bridge edge at midpoint to create bridgeCenterNode
                    const splitResult = webGraph.splitEdge(this.bridgeEdge, 0.5);
                    this.bridgeCenterNode = splitResult.newNode;
                    // Update bridgeEdge reference - it's been split into two
                    // We keep a reference to the first half for future use
                    this.bridgeEdge = splitResult.edgeA;

                    // Replace thread3's nodeB with bridgeCenterNode so they're
                    // physically the same point
                    const oldNodeB = this.thread3Edge.nodeB;
                    oldNodeB.edges = oldNodeB.edges.filter(e => e !== this.thread3Edge);
                    if (oldNodeB.edges.length === 0) {
                        const idx = webGraph.nodes.indexOf(oldNodeB);
                        if (idx >= 0) webGraph.nodes.splice(idx, 1);
                    }
                    this.thread3Edge.nodeB = this.bridgeCenterNode;
                    this.bridgeCenterNode.edges.push(this.thread3Edge);
                }
            }

            initializeSpokes() {
                const centerX = this.hubNode.x;
                const centerY = this.hubNode.y;

                this.spokes = [];

                // thread1a: from hub toward bridge start
                if (this.thread1aEdge) {
                    const endNode = this.thread1aEdge.nodeA; // bridgeStartNode end
                    const angle = Math.atan2(endNode.y - centerY, endNode.x - centerX);
                    this.spokes.push({ edge: this.thread1aEdge, angle, anchorPoint: { x: endNode.x, y: endNode.y } });
                }

                // thread1b: from hub toward bridge end
                if (this.thread1bEdge) {
                    const endNode = this.thread1bEdge.nodeB; // bridgeEndNode end
                    const angle = Math.atan2(endNode.y - centerY, endNode.x - centerX);
                    this.spokes.push({ edge: this.thread1bEdge, angle, anchorPoint: { x: endNode.x, y: endNode.y } });
                }

                // rappel: from hub down to branch
                if (this.rappelEdge) {
                    const endNode = this.rappelEdge.nodeB;
                    const angle = Math.atan2(endNode.y - centerY, endNode.x - centerX);
                    this.spokes.push({ edge: this.rappelEdge, angle, anchorPoint: { x: endNode.x, y: endNode.y } });
                }

                // thread3: from hub toward bridge center
                if (this.thread3Edge) {
                    const endNode = this.thread3Edge.nodeB;
                    const angle = Math.atan2(endNode.y - centerY, endNode.x - centerX);
                    this.spokes.push({ edge: this.thread3Edge, angle, anchorPoint: { x: endNode.x, y: endNode.y } });
                }
            }

            draw() {
                if (this.tying) {
                    ctx.strokeStyle = '#000000';
                    ctx.lineWidth = 1;

                    const leftAngle1 = -Math.PI / 4 + this.legAnimation * 0.5;
                    const leftAngle2 = -Math.PI / 3 - this.legAnimation * 0.8;
                    const leftJointX = this.x + Math.cos(leftAngle1) * 8;
                    const leftJointY = this.y + Math.sin(leftAngle1) * 8;
                    const leftEndX = leftJointX + Math.cos(leftAngle1 + leftAngle2) * 6;
                    const leftEndY = leftJointY + Math.sin(leftAngle1 + leftAngle2) * 6;

                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(leftJointX, leftJointY);
                    ctx.lineTo(leftEndX, leftEndY);
                    ctx.stroke();

                    const rightAngle1 = -Math.PI / 4 - this.legAnimation * 0.5;
                    const rightAngle2 = -Math.PI / 3 + this.legAnimation * 0.8;
                    const rightJointX = this.x + Math.cos(rightAngle1) * 8;
                    const rightJointY = this.y + Math.sin(rightAngle1) * 8;
                    const rightEndX = rightJointX + Math.cos(rightAngle1 + rightAngle2) * 6;
                    const rightEndY = rightJointY + Math.sin(rightAngle1 + rightAngle2) * 6;

                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(rightJointX, rightJointY);
                    ctx.lineTo(rightEndX, rightEndY);
                    ctx.stroke();
                }

                ctx.fillStyle = '#000000';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // ==================== Branch Generation ====================
        function generateBranches() {
            branches = [];
            const seedX = width * (0.25 + Math.random() * 0.5);
            const seedY = height - 10;
            const leftBranch = generateBranchSide(seedX, seedY, -1);
            branches.push(leftBranch);
            const rightBranch = generateBranchSide(seedX, seedY, 1);
            branches.push(rightBranch);
        }

        function generateBranchSide(startX, startY, direction) {
            const segments = 8;
            const baseThickness = 12;
            let currentX = startX;
            let currentY = startY;
            let currentAngle = -45;
            const mainBranch = new Branch(currentX, currentY, currentX, currentY, baseThickness, 0);
            let currentBranch = mainBranch;

            for (let i = 0; i < segments; i++) {
                const segmentLength = 100 + Math.random() * 60;
                const thickness = baseThickness - (i * 1.2);
                // Small random variation instead of zigzag
                const wobble = (Math.random() - 0.5) * 8;
                // Start pointing outward (-25), gradually curve upward toward -80
                const progress = i / (segments - 1);
                const targetAngle = -45 + progress * -55;
                currentAngle += (targetAngle - currentAngle) * 0.4 + wobble;
                currentAngle = Math.max(-85, Math.min(-10, currentAngle));
                const angleRad = (currentAngle * Math.PI) / 180;
                const newX = currentX + Math.cos(angleRad) * segmentLength * direction;
                const newY = currentY + Math.sin(angleRad) * segmentLength;
                const boundedX = Math.max(30, Math.min(width - 30, newX));
                const boundedY = Math.max(30, newY);
                const segment = new Branch(currentX, currentY, boundedX, boundedY, thickness, i + 1);
                currentBranch.addChild(segment);

                if (i > 1 && i < segments - 1 && Math.random() > 0.5) {
                    addTwig(currentX, currentY, currentAngle, thickness * 0.6, direction);
                }

                currentX = boundedX;
                currentY = boundedY;
                currentBranch = segment;
                if (currentY < 50) break;
            }

            return mainBranch;

            function addTwig(x, y, baseAngle, thickness, dir) {
                const twigAngle = baseAngle + (Math.random() > 0.5 ? 1 : -1) * (30 + Math.random() * 30);
                const twigLength = 30 + Math.random() * 30;
                const angleRad = (twigAngle * Math.PI) / 180;
                const twigX = x + Math.cos(angleRad) * twigLength * dir;
                const twigY = y + Math.sin(angleRad) * twigLength;
                const twig = new Branch(x, y, twigX, twigY, thickness, 10);
                currentBranch.addChild(twig);

                if (Math.random() > 0.7) {
                    const subTwigAngle = twigAngle + (Math.random() - 0.5) * 40;
                    const subTwigLength = 20 + Math.random() * 20;
                    const subAngleRad = (subTwigAngle * Math.PI) / 180;
                    const subTwigX = twigX + Math.cos(subAngleRad) * subTwigLength * dir;
                    const subTwigY = twigY + Math.sin(subAngleRad) * subTwigLength;
                    const subTwig = new Branch(twigX, twigY, subTwigX, subTwigY, thickness * 0.7, 11);
                    twig.addChild(subTwig);
                }
            }
        }

        function createSpider() {
            if (branches.length > 0) {
                const leftBranch = branches[0];
                let segmentCount = 0;
                let sixthSegment = null;

                function findSegment(branch) {
                    if (branch.generation > 0) {
                        segmentCount++;
                        if (segmentCount === 6) {
                            sixthSegment = branch;
                            return true;
                        }
                    }
                    for (let child of branch.children) {
                        if (child.generation <= 6) {
                            if (findSegment(child)) return true;
                        }
                    }
                    return false;
                }

                findSegment(leftBranch);

                if (sixthSegment) {
                    const midX = (sixthSegment.x1 + sixthSegment.x2) / 2;
                    const midY = (sixthSegment.y1 + sixthSegment.y2) / 2;
                    spider = new Spider(midX, midY);
                } else {
                    const forkX = branches[0].x1;
                    const forkY = branches[0].y1;
                    spider = new Spider(forkX, forkY - 15);
                }
            }
        }

        function startWeaving() {
            if (spider) {
                spider.startWeaving();
            }
        }

        // ==================== Draw ====================
        function draw() {
            ctx.fillStyle = '#f5f5dc';
            ctx.fillRect(0, 0, width, height);
            branches.forEach(branch => branch.draw());
            for (const edge of webGraph.edges) edge.draw(ctx);
            // Draw junction nodes
            for (const node of webGraph.nodes) {
                if (node.edges.length > 1 || node.fixed) {
                    ctx.fillStyle = '#3c3c3c';
                    ctx.beginPath();
                    ctx.arc(node.x, node.y, 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            if (spider) {
                spider.draw();
            }
        }

        // ==================== Animate ====================
        function animate() {
            // Apply gravity per-edge (skip floating silk)
            for (const edge of webGraph.edges) {
                if (edge.isWindAffected) continue;
                const scale = Math.min(1, 20 / Math.max(1, edge.getPointCount()));
                const gravity = 0.05 * scale;
                edge.applyGravity(gravity);
                if (!edge.nodeA.fixed) edge.nodeA.vy += gravity;
                if (!edge.nodeB.fixed) edge.nodeB.vy += gravity;
            }
            // Apply wind
            if (windEnabled) {
                for (const edge of webGraph.edges) edge.applyWind(windForce);
            }
            // Integrate
            for (const node of webGraph.nodes) node.integrate();
            for (const edge of webGraph.edges) edge.integrateSegments();
            // Constraint solver (alternate direction to prevent endpoint bias)
            for (let iter = 0; iter < 60; iter++) {
                const reverse = iter % 2 === 1;
                for (const edge of webGraph.edges) edge.solveConstraints(reverse);
                for (const node of webGraph.nodes) {
                    if (node.fixed) { node.vx = 0; node.vy = 0; }
                }
            }
            // Spider update
            if (spider) {
                spider.update();

                const debugDiv = document.getElementById('debugInfo');
                if (debugDiv) {
                    const edgeCount = webGraph.edges.length;
                    const nodeCount = webGraph.nodes.length;
                    const spokeCount = spider.spokes ? spider.spokes.length : 0;

                    if (spider.state === 'crossing_bridge' && spider.bridgeEdge) {
                        debugDiv.innerHTML = `CROSSING<br>
                            Progress: ${Math.floor(spider.crossProgress * 100)}%<br>
                            Edges: ${edgeCount}<br>
                            Nodes: ${nodeCount}`;
                    } else {
                        debugDiv.innerHTML = `State: ${spider.state}<br>
                            Edges: ${edgeCount}<br>
                            Nodes: ${nodeCount}<br>
                            Spokes: ${spokeCount}/${spider.maxSpokes}`;
                    }
                }
            }
            draw();
            requestAnimationFrame(animate);
        }

        function regenerate() {
            webGraph = new WebGraph();
            generateBranches();
            createSpider();
        }

        const windToggle = document.getElementById('windToggle');
        const windStatus = document.getElementById('windStatus');

        windToggle.addEventListener('change', (e) => {
            windEnabled = e.target.checked;
            windStatus.textContent = windEnabled ? 'On' : 'Off';
        });

        const metricsToggle = document.getElementById('metricsToggle');
        const metricsStatus = document.getElementById('metricsStatus');
        metricsToggle.addEventListener('change', (e) => {
            metricsEnabled = e.target.checked;
            metricsStatus.textContent = metricsEnabled ? 'On' : 'Off';
        });

        const speedSlider = document.getElementById('speedSlider');
        const speedValue = document.getElementById('speedValue');
        speedSlider.addEventListener('input', (e) => {
            speedMultiplier = parseFloat(e.target.value);
            speedValue.textContent = speedMultiplier.toFixed(1);
        });

        const tensionSlider = document.getElementById('tensionSlider');
        const tensionValue = document.getElementById('tensionValue');
        tensionSlider.addEventListener('input', (e) => {
            targetTension = parseFloat(e.target.value);
            tensionValue.textContent = targetTension.toFixed(1);
        });

        window.addEventListener('resize', () => {
            resizeCanvas();
            regenerate();
        });

        resizeCanvas();
        updateWindForce();
        webGraph = new WebGraph();
        generateBranches();
        createSpider();
        animate();
    </script>
</body>
</html>
