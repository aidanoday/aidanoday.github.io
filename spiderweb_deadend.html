                    const thread1b = new DraggedSilk(thread1b_segments[0].x, thread1b_segments[0].y);
                    thread1b.segments = thread1b_segments;
                    thread1b.attached = true;
                    thread1b.spiderAttached = false;
                    thread1b.explicitConnections = new Set([0, thread1b_segments.length - 1]);
                    thread1b.thread0EndpointSegment = this.secondStrand.thread0EndpointSegment;
                    
                    // Update webNodes to reference the new split threads
                    for (let node of webNodes) {
                        if (node.strand1 === this.secondStrand) {
                            if (node.segmentIndex1 <= thread1SegIdx) {
                                node.strand1 = thread1a;
                            } else {
                                node.strand1 = thread1b;
                                node.segmentIndex1 = node.segmentIndex1 - thread1SegIdx;
                            }
                        }
                        if (node.strand2 === this.secondStrand) {
                            if (node.segmentIndex2 <= thread1SegIdx) {
                                node.strand2 = thread1a;
                            } else {
                                node.strand2 = thread1b;
                                node.segmentIndex2 = node.segmentIndex2 - thread1SegIdx;
                            }
                        }
                    }
                    
                    // Remove old thread1 and add the two new threads
                    const oldIndex = silkStrands.indexOf(this.secondStrand);
                    if (oldIndex >= 0) {
                        silkStrands.splice(oldIndex, 1);
                    }
                    silkStrands.push(thread1a);
                    silkStrands.push(thread1b);
                    
                    // Store references to the split threads
                    this.thread1a = thread1a;
                    this.thread1b = thread1b;
                    
                    // Create thread2 (rappel line) attached to the shared segment
                    this.thirdStrand = new RappelSilk(thread1Seg.x, thread1Seg.y, null, 0);
                    this.thirdStrand.segments[0] = thread1Seg;
                    this.thirdStrand.explicitConnections.add(0);
                    silkStrands.push(this.thirdStrand);
                    
                    this.state = 'rappelling';
                    this.releaseTimer = 0;
                } else if (this.state === 'rappelling') {
                    this.releaseTimer++;
                    
                    if (this.releaseTimer % 3 === 0) {
                        this.thirdStrand.addSegment();
                    }
                    
                    if (this.thirdStrand.segments.length >= 10 && this.weight === 0) {
                        this.weight = this.originalWeight;
                    }
                    
                    const spiderPos = this.thirdStrand.getSpiderPosition();
                    this.x = spiderPos.x;
                    this.y = spiderPos.y;
                    
                    for (let branch of branches) {
                        const collision = branch.checkCollision(this.x, this.y, this.radius);
                        if (collision) {
                            this.thirdStrand.attach(collision.x, collision.y);
                            this.state = 'rappel_complete';
                            break;
                        }
                    }
                    
                    if (this.thirdStrand.segments.length > 100) {
                        this.state = 'rappel_complete';
                    }
                } else if (this.state === 'rappel_complete') {
                    if (this.weight === 0) {
                        this.weight = this.originalWeight;
                    }
                    this.thread2InitialSegments = this.thirdStrand.segments.length;
                    this.state = 'tensioning_thread2';
                    this.tying = true;
                    this.tyingTimer = 0;
                } else if (this.state === 'tensioning_thread2') {
                    this.tyingTimer++;
                    this.legAnimation = Math.sin(this.tyingTimer * 0.2) * 0.5 + 0.5;
                    
                    if (this.thirdStrand) {
                        const targetSegments = Math.ceil(this.thread2InitialSegments * 0.75);
                        
                        if (this.thirdStrand.segments.length > targetSegments && this.thirdStrand.segments.length > 3) {
                            const removeIdx = Math.floor(this.thirdStrand.segments.length / 2);
                            this.thirdStrand.segments.splice(removeIdx, 1);
                        } else {
                            this.tying = false;
                            this.state = 'web_complete';
                        }
                    }
                    
                    const spiderPos = this.thirdStrand.getSpiderPosition();
                    this.x = spiderPos.x;
                    this.y = spiderPos.y;
                } else if (this.state === 'web_complete') {
                    if (this.thirdStrand) {
                        const spiderPos = this.thirdStrand.getSpiderPosition();
                        this.x = spiderPos.x;
                        this.y = spiderPos.y;
                    }
                    
                    this.waitTimer++;
                    if (this.waitTimer > 60) {
                        this.state = 'climbing_thread2';
                        this.walkProgress = 1.0;
                        this.waitTimer = 0;
                    }
                } else if (this.state === 'climbing_thread2') {
                    this.walkProgress -= 0.01;
                    
                    if (this.walkProgress <= 0) {
                        this.walkProgress = 0;
                        const connectionSeg = this.thirdStrand.segments[0];
                        this.x = connectionSeg.x;
                        this.y = connectionSeg.y;
                        this.state = 'start_thread3';
                    } else {
                        const idx = Math.floor(this.walkProgress * (this.thirdStrand.segments.length - 1));
                        const nextIdx = Math.min(idx + 1, this.thirdStrand.segments.length - 1);
                        const t = (this.walkProgress * (this.thirdStrand.segments.length - 1)) - idx;
                        
                        const s1 = this.thirdStrand.segments[idx];
                        const s2 = this.thirdStrand.segments[nextIdx];
                        
                        this.x = s1.x + (s2.x - s1.x) * t;
                        this.y = s1.y + (s2.y - s1.y) * t;
                        
                        if (!s1.fixed) {
                            s1.vy += this.weight * (1 - t);
                        }
                        if (!s2.fixed) {
                            s2.vy += this.weight * t;
                        }
                    }
                } else if (this.state === 'start_thread3') {
                    const connectionSeg = this.thirdStrand.segments[0];
                    this.fourthStrand = new DraggedSilk(connectionSeg.x, connectionSeg.y);
                    this.fourthStrand.segments[0] = connectionSeg;
                    this.fourthStrand.spiderAttached = true;
                    this.fourthStrand.explicitConnections.add(0);
                    this.fourthStrand.addSegment();
                    silkStrands.push(this.fourthStrand);
                    
                    // Choose thread1a to walk on (could also randomly choose)
                    this.walkingThread = this.thread1a;
                    this.walkProgress = 1.0;
                    this.lastWalkSegmentIndex = undefined;
                    this.state = 'walking_to_thread0';
                } else if (this.state === 'walking_to_thread0') {
                    if (this.fourthStrand) {
                        this.fourthStrand.setSpiderPosition(0);
                    }
                    
                    const currentWalkSegmentIndex = Math.floor(this.walkProgress * (this.walkingThread.segments.length - 1));
                    
                    if (this.lastWalkSegmentIndex === undefined) {
                        this.lastWalkSegmentIndex = this.walkingThread.segments.length;
                    }
                    
                    // Only add segments every 2 segment indices to reduce density
                    if (currentWalkSegmentIndex < this.lastWalkSegmentIndex - 1) {
                        this.fourthStrand.addSegment();
                        this.lastWalkSegmentIndex = currentWalkSegmentIndex;
                    }
                    
                    this.walkProgress -= 0.01;
                    
                    if (this.walkProgress <= 0.01) {
                        this.walkProgress = 0.0;
                        const seg = this.walkingThread.segments[0];
                        this.x = seg.x;
                        this.y = seg.y;
                        this.lastWalkSegmentIndex = undefined;
                        this.walkingThread = this.bridgeStrand;
                        
                        // Find where thread1a connects to thread0
                        const thread1aStart = this.thread1a.segments[0];
                        let closestIdx = 0;
                        let closestDist = Infinity;
                        for (let i = 0; i < this.bridgeStrand.segments.length; i++) {
                            const seg = this.bridgeStrand.segments[i];
                            const dx = seg.x - thread1aStart.x;
                            const dy = seg.y - thread1aStart.y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist < closestDist) {
                                closestDist = dist;
                                closestIdx = i;
                            }
                        }
                        
                        this.walkProgress = closestIdx / (this.bridgeStrand.segments.length - 1);
                        this.state = 'walking_to_thread0_center';
                    } else {
                        const idx = Math.floor(this.walkProgress * (this.walkingThread.segments.length - 1));
                        const nextIdx = Math.min(idx + 1, this.walkingThread.segments.length - 1);
                        const t = (this.walkProgress * (this.walkingThread.segments.length - 1)) - idx;
                        
                        const s1 = this.walkingThread.segments[idx];
                        const s2 = this.walkingThread.segments[nextIdx];
                        
                        this.x = s1.x + (s2.x - s1.x) * t;
                        this.y = s1.y + (s2.y - s1.y) * t;
                        
                        if (!s1.fixed) {
                            s1.vy += this.weight * (1 - t);
                        }
                        if (!s2.fixed) {
                            s2.vy += this.weight * t;
                        }
                    }
                    
                    if (this.fourthStrand && this.fourthStrand.spiderAttached) {
                        this.fourthStrand.updateTipPosition(this.x, this.y);
                    }
                } else if (this.state === 'walking_to_thread0_center') {
                    if (this.fourthStrand) {
                        this.fourthStrand.setSpiderPosition(0);
                    }
                    
                    const currentWalkSegmentIndex = Math.floor(this.walkProgress * (this.walkingThread.segments.length - 1));
                    
                    if (this.lastWalkSegmentIndex === undefined) {
                        this.lastWalkSegmentIndex = currentWalkSegmentIndex;
                    }
                    
                    const targetProgress = 0.5;
                    const direction = targetProgress > this.walkProgress ? 1 : -1;
                    
                    // Only add segments every 2 segment indices to reduce density
                    if (direction > 0 && currentWalkSegmentIndex > this.lastWalkSegmentIndex + 1) {
                        this.fourthStrand.addSegment();
                        this.lastWalkSegmentIndex = currentWalkSegmentIndex;
                    } else if (direction < 0 && currentWalkSegmentIndex < this.lastWalkSegmentIndex - 1) {
                        this.fourthStrand.addSegment();
                        this.lastWalkSegmentIndex = currentWalkSegmentIndex;
                    }
                    
                    if (Math.abs(this.walkProgress - targetProgress) < 0.01) {
                        this.walkProgress = targetProgress;
                        this.lastWalkSegmentIndex = undefined;
                        this.state = 'tying_thread3';
                        this.tying = true;
                        this.tyingTimer = 0;
                    } else {
                        this.walkProgress += direction * 0.01;
                        
                        const idx = Math.floor(this.walkProgress * (this.walkingThread.segments.length - 1));
                        const nextIdx = Math.min(idx + 1, this.walkingThread.segments.length - 1);
                        const t = (this.walkProgress * (this.walkingThread.segments.length - 1)) - idx;
                        
                        const s1 = this.walkingThread.segments[idx];
                        const s2 = this.walkingThread.segments[nextIdx];
                        
                        this.x = s1.x + (s2.x - s1.x) * t;
                        this.y = s1.y + (s2.y - s1.y) * t;
                        
                        if (!s1.fixed) {
                            s1.vy += this.weight * (1 - t);
                        }
                        if (!s2.fixed) {
                            s2.vy += this.weight * t;
                        }
                    }
                    
                    if (this.fourthStrand && this.fourthStrand.spiderAttached) {
                        this.fourthStrand.updateTipPosition(this.x, this.y);
                    }
                } else if (this.state === 'tying_thread3') {
                    this.tyingTimer++;
                    this.legAnimation = Math.sin(this.tyingTimer * 0.2) * 0.5 + 0.5;
                    
                    const idx = Math.floor(0.5 * (this.bridgeStrand.segments.length - 1));
                    const seg = this.bridgeStrand.segments[idx];
                    this.x = seg.x;
                    this.y = seg.y;
                    
                    if (this.fourthStrand && this.fourthStrand.spiderAttached) {
                        this.fourthStrand.updateTipPosition(this.x, this.y);
                    }
                    
                    if (this.tyingTimer > 60) {
                        this.tying = false;
                        this.attachFourthStrand();
                        
                        if (this.fourthStrand && this.fourthStrand.attached) {
                            this.thread3InitialSegments = this.fourthStrand.segments.length;
                            this.state = 'tensioning_thread3';
                            this.tyingTimer = 0;
                        }
                    }
                } else if (this.state === 'tensioning_thread3') {
                    this.tyingTimer++;
                    this.legAnimation = Math.sin(this.tyingTimer * 0.2) * 0.5 + 0.5;
                    this.tying = true;
                    
                    if (this.fourthStrand) {
                        const start = this.fourthStrand.segments[0];
                        const end = this.fourthStrand.segments[this.fourthStrand.segments.length - 1];
                        const dx = end.x - start.x;
                        const dy = end.y - start.y;
                        const straightDist = Math.sqrt(dx * dx + dy * dy);
                        
                        let threadLength = 0;
                        for (let i = 0; i < this.fourthStrand.segments.length - 1; i++) {
                            const s1 = this.fourthStrand.segments[i];
                            const s2 = this.fourthStrand.segments[i + 1];
                            const segDx = s2.x - s1.x;
                            const segDy = s2.y - s1.y;
                            threadLength += Math.sqrt(segDx * segDx + segDy * segDy);
                        }
                        
                        const targetLength = straightDist + this.fourthStrand.segmentLength;
                        
                        if (threadLength > targetLength && this.fourthStrand.segments.length > 3) {
                            const removeIdx = Math.floor(this.fourthStrand.segments.length / 2);
                            this.fourthStrand.segments.splice(removeIdx, 1);
                        } else {
                            this.tying = false;
                            this.state = 'final_complete';
                        }
                    }
                    
                    const idx = Math.floor(0.5 * (this.bridgeStrand.segments.length - 1));
                    const seg = this.bridgeStrand.segments[idx];
                    this.x = seg.x;
                    this.y = seg.y;
                } else if (this.state === 'final_complete') {
                    const idx = Math.floor(0.5 * (this.bridgeStrand.segments.length - 1));
                    const seg = this.bridgeStrand.segments[idx];
                    this.x = seg.x;
                    this.y = seg.y;
                    
                    this.waitTimer++;
                    if (this.waitTimer > 60) {
                        this.state = 'returning_to_radial';
                        this.walkProgress = 1.0;
                        this.walkingThread = this.fourthStrand;
                        this.waitTimer = 0;
                    }
                } else if (this.state === 'returning_to_radial') {
                    this.walkProgress -= 0.015;
                    
                    if (this.walkProgress <= 0) {
                        this.walkProgress = 0;
                        const connectionSeg = this.fourthStrand.segments[0];
                        this.x = connectionSeg.x;
                        this.y = connectionSeg.y;
                        this.state = 'resting_at_convergence';
                    } else {
                        const idx = Math.floor(this.walkProgress * (this.fourthStrand.segments.length - 1));
                        const nextIdx = Math.min(idx + 1, this.fourthStrand.segments.length - 1);
                        const t = (this.walkProgress * (this.fourthStrand.segments.length - 1)) - idx;
                        
                        const s1 = this.fourthStrand.segments[idx];
                        const s2 = this.fourthStrand.segments[nextIdx];
                        
                        this.x = s1.x + (s2.x - s1.x) * t;
                        this.y = s1.y + (s2.y - s1.y) * t;
                        
                        if (!s1.fixed) {
                            s1.vy += this.weight * (1 - t);
                        }
                        if (!s2.fixed) {
                            s2.vy += this.weight * t;
                        }
                    }
                } else if (this.state === 'resting_at_convergence') {
                    const connectionSeg = this.thirdStrand.segments[0];
                    this.x = connectionSeg.x;
                    this.y = connectionSeg.y;

                    this.waitTimer++;
                    if (this.waitTimer > 60) {
                        this.waitTimer = 0;
                        this.initializeSpokes();
                        this.state = 'plan_next_spoke';
                    }
                } else if (this.state === 'plan_next_spoke') {
                    const connectionSeg = this.thirdStrand.segments[0];
                    this.x = connectionSeg.x;
                    this.y = connectionSeg.y;

                    if (this.spokes.length >= this.maxSpokes) {
                        this.state = 'all_spokes_complete';
                        return;
                    }

                    const centerX = connectionSeg.x;
                    const centerY = connectionSeg.y;

                    // Try multiple gap bisections — skip angles where no anchor is found
                    let anchor = null;
                    let targetAngle = 0;
                    const triedAngles = [];
                    const MAX_TRIES = 5;

                    for (let attempt = 0; attempt < MAX_TRIES; attempt++) {
                        targetAngle = findLargestSpokeGap(this.spokes);
                        console.log(`[spoke] Planning spoke ${this.spokes.length + 1}/${this.maxSpokes}, target angle: ${(targetAngle * 180 / Math.PI).toFixed(1)}° (attempt ${attempt + 1})`);

                        anchor = findAnchorOnBranchOrStrand(centerX, centerY, targetAngle, branches, silkStrands);
                        if (anchor) {
                            console.log(`[spoke] Anchor found at (${anchor.x.toFixed(0)}, ${anchor.y.toFixed(0)}) on ${anchor.sourceType}`);
                            break;
                        }

                        console.log('[spoke] No anchor found at this angle, marking and trying next gap');
                        // Mark this angle as "used" so findLargestSpokeGap picks the next gap
                        this.spokes.push({ strand: null, angle: targetAngle, anchorPoint: null });
                        triedAngles.push(targetAngle);
                    }

                    if (!anchor) {
                        console.log('[spoke] Exhausted all attempts, stopping spoke building');
                        this.state = 'all_spokes_complete';
                        return;
                    }

                    this.spokeAnchorPoint = { x: anchor.x, y: anchor.y };

                    // Build the walk path directly:
                    // Step 1: Walk outward along the existing spoke whose outer end
                    //         is closest to the anchor point
                    // Step 2: Walk along branches/frame from that spoke's end to the anchor

                    // Find the best spoke to walk out along (closest outer end to anchor)
                    let bestSpoke = null;
                    let bestDist = Infinity;
                    for (const spoke of this.spokes) {
                        if (!spoke.strand || !spoke.anchorPoint) continue;
                        const dx = spoke.anchorPoint.x - anchor.x;
                        const dy = spoke.anchorPoint.y - anchor.y;
                        const d = Math.sqrt(dx * dx + dy * dy);
                        if (d < bestDist) {
                            bestDist = d;
                            bestSpoke = spoke;
                        }
                    }

                    if (!bestSpoke || !bestSpoke.strand) {
                        console.log('[spoke] No valid spoke to walk along');
                        this.spokes.push({ strand: null, angle: targetAngle, anchorPoint: this.spokeAnchorPoint });
                        return;
                    }

                    const path = [];

                    // Step 1: Walk along the chosen spoke from center to its outer end
                    const spokeStrand = bestSpoke.strand;
                    const spokeStartSeg = spokeStrand.segments[0];
                    const spokeEndSeg = spokeStrand.segments[spokeStrand.segments.length - 1];

                    // Determine which end is near center
                    const dStartToCenter = Math.hypot(spokeStartSeg.x - centerX, spokeStartSeg.y - centerY);
                    const dEndToCenter = Math.hypot(spokeEndSeg.x - centerX, spokeEndSeg.y - centerY);

                    let spokeOuterEnd, spokeFromNode, spokeToNode;
                    if (dStartToCenter < dEndToCenter) {
                        // segment 0 is near center, walk 0 → end
                        spokeFromNode = { x: spokeStartSeg.x, y: spokeStartSeg.y };
                        spokeToNode = { x: spokeEndSeg.x, y: spokeEndSeg.y };
                        spokeOuterEnd = spokeEndSeg;
                    } else {
                        // last segment is near center, walk end → 0
                        spokeFromNode = { x: spokeEndSeg.x, y: spokeEndSeg.y };
                        spokeToNode = { x: spokeStartSeg.x, y: spokeStartSeg.y };
                        spokeOuterEnd = spokeStartSeg;
                    }

                    path.push({
                        walkable: { type: 'strand', ref: spokeStrand, startIdx: 0, endIdx: spokeStrand.segments.length - 1 },
                        fromNode: spokeFromNode,
                        toNode: spokeToNode,
                        distance: bestDist
                    });

                    // Step 2: If the spoke outer end isn't already at the anchor,
                    //         use the graph to find a path from the spoke end to the anchor
                    const spokeToAnchorDist = Math.hypot(spokeOuterEnd.x - anchor.x, spokeOuterEnd.y - anchor.y);
                    if (spokeToAnchorDist > 15) {
                        this.walkableGraph = new WalkableGraph();
                        this.walkableGraph.build(silkStrands, branches, { x: centerX, y: centerY });

                        const anchorNodeId = this.walkableGraph.addNode(anchor.x, anchor.y, 'anchor', anchor.source);

                        // Connect anchor to the specific branch/strand it sits on
                        if (anchor.sourceType === 'branch') {
                            // Find graph nodes for this branch's endpoints and connect anchor between them
                            const bStartId = this.walkableGraph.findNearestNode(anchor.source.x1, anchor.source.y1, 20);
                            const bEndId = this.walkableGraph.findNearestNode(anchor.source.x2, anchor.source.y2, 20);
                            if (bStartId >= 0) {
                                const d = Math.hypot(anchor.x - anchor.source.x1, anchor.y - anchor.source.y1);
                                this.walkableGraph.addEdge(bStartId, anchorNodeId, d, {
                                    type: 'branch', ref: anchor.source, startIdx: 0, endIdx: 1
                                });
                            }
                            if (bEndId >= 0) {
                                const d = Math.hypot(anchor.x - anchor.source.x2, anchor.y - anchor.source.y2);
                                this.walkableGraph.addEdge(anchorNodeId, bEndId, d, {
                                    type: 'branch', ref: anchor.source, startIdx: 0, endIdx: 1
                                });
                            }
                        } else if (anchor.sourceType === 'strand') {
                            const strand = anchor.source;
                            const sStart = strand.segments[0];
                            const sEnd = strand.segments[strand.segments.length - 1];
                            const sStartId = this.walkableGraph.findNearestNode(sStart.x, sStart.y, 20);
                            const sEndId = this.walkableGraph.findNearestNode(sEnd.x, sEnd.y, 20);
                            if (sStartId >= 0) {
                                const d = Math.hypot(anchor.x - sStart.x, anchor.y - sStart.y);
                                this.walkableGraph.addEdge(sStartId, anchorNodeId, d, {
                                    type: 'strand', ref: strand, startIdx: 0, endIdx: strand.segments.length - 1
                                });
                            }
                            if (sEndId >= 0) {
                                const d = Math.hypot(anchor.x - sEnd.x, anchor.y - sEnd.y);
                                this.walkableGraph.addEdge(anchorNodeId, sEndId, d, {
                                    type: 'strand', ref: strand, startIdx: 0, endIdx: strand.segments.length - 1
                                });
                            }
                        }

                        // Also add proximity edges for any close nodes (fallback)
                        for (let i = 0; i < this.walkableGraph.nodes.length - 1; i++) {
                            const node = this.walkableGraph.nodes[i];
                            const d = Math.hypot(node.x - anchor.x, node.y - anchor.y);
                            if (d < 40) {
                                const alreadyConnected = this.walkableGraph.adjacency.get(i).some(e => e.toId === anchorNodeId);
                                if (!alreadyConnected) {
                                    this.walkableGraph.addEdge(i, anchorNodeId, d, {
                                        type: 'proximity', ref: null, startIdx: 0, endIdx: 0
                                    });
                                }
                            }
                        }

                        // Ensure the spoke outer end is in the graph and connected
                        let spokeEndNodeId = this.walkableGraph.findNearestNode(spokeOuterEnd.x, spokeOuterEnd.y, 50);
                        if (spokeEndNodeId < 0) {
                            spokeEndNodeId = this.walkableGraph.addNode(spokeOuterEnd.x, spokeOuterEnd.y, 'spoke_end', null);
                        }
                        // Connect spoke end to all nearby nodes
                        for (let i = 0; i < this.walkableGraph.nodes.length; i++) {
                            if (i === spokeEndNodeId) continue;
                            const node = this.walkableGraph.nodes[i];
                            const d = Math.hypot(node.x - spokeOuterEnd.x, node.y - spokeOuterEnd.y);
                            if (d < 40) {
                                const alreadyConnected = this.walkableGraph.adjacency.get(spokeEndNodeId).some(e => e.toId === i);
                                if (!alreadyConnected) {
                                    this.walkableGraph.addEdge(spokeEndNodeId, i, d, {
                                        type: 'proximity', ref: null, startIdx: 0, endIdx: 0
                                    });
                                }
                            }
                        }

                        // If spoke end and anchor are both on the same strand (e.g. thread0),
                        // directly connect them so the spider can walk along that strand
                        if (anchor.sourceType === 'strand') {
                            const strand = anchor.source;
                            // Check if spoke end is also near this strand
                            let spokeOnStrand = false;
                            for (let i = 0; i < strand.segments.length; i++) {
                                const seg = strand.segments[i];
                                if (Math.hypot(seg.x - spokeOuterEnd.x, seg.y - spokeOuterEnd.y) < 20) {
                                    spokeOnStrand = true;
                                    break;
                                }
                            }
                            if (spokeOnStrand) {
                                const d = Math.hypot(spokeOuterEnd.x - anchor.x, spokeOuterEnd.y - anchor.y);
                                this.walkableGraph.addEdge(spokeEndNodeId, anchorNodeId, d, {
                                    type: 'strand', ref: strand, startIdx: 0, endIdx: strand.segments.length - 1
                                });
                            }
                        }

                        // Also directly connect spoke end to anchor if they're both on the same branch
                        const projOnBranch = (px, py, br) => {
                            const bdx = br.x2 - br.x1, bdy = br.y2 - br.y1;
                            const len2 = bdx * bdx + bdy * bdy;
                            if (len2 === 0) return null;
                            const t = Math.max(0, Math.min(1, ((px - br.x1) * bdx + (py - br.y1) * bdy) / len2));
                            return Math.hypot(px - (br.x1 + bdx * t), py - (br.y1 + bdy * t));
                        };
                        const checkBranches = (br) => {
                            const dEnd = projOnBranch(spokeOuterEnd.x, spokeOuterEnd.y, br);
                            const dAnc = projOnBranch(anchor.x, anchor.y, br);
                            if (dEnd !== null && dEnd < 20 && dAnc !== null && dAnc < 20) {
                                const d = Math.hypot(spokeOuterEnd.x - anchor.x, spokeOuterEnd.y - anchor.y);
                                const alreadyConnected = this.walkableGraph.adjacency.get(spokeEndNodeId).some(e => e.toId === anchorNodeId);
                                if (!alreadyConnected) {
                                    this.walkableGraph.addEdge(spokeEndNodeId, anchorNodeId, d, {
                                        type: 'branch', ref: br, startIdx: 0, endIdx: 1
                                    });
                                }
                            }
                            for (const child of br.children) checkBranches(child);
                        };
                        for (const br of branches) checkBranches(br);

                        // Exclude the center node so the bridge path can't route back through the hub
                        const centerNodeId2 = this.walkableGraph.findNearestNode(centerX, centerY, 15);
                        const excludeSet = centerNodeId2 >= 0 ? [centerNodeId2] : [];
                        if (spokeEndNodeId >= 0) {
                            const bridgePath = this.walkableGraph.findShortestPath(spokeEndNodeId, anchorNodeId, excludeSet);
                            if (bridgePath) {
                                path.push(...bridgePath);
                                console.log(`[spoke] Bridge path: ${bridgePath.length} steps from spoke end to anchor`);
                            } else {
                                console.log(`[spoke] WARNING: No bridge path found! Spoke end node ${spokeEndNodeId} → anchor node ${anchorNodeId}`);
                                console.log(`[spoke] Spoke end at (${spokeOuterEnd.x.toFixed(0)}, ${spokeOuterEnd.y.toFixed(0)}), anchor at (${anchor.x.toFixed(0)}, ${anchor.y.toFixed(0)})`);
                                console.log(`[spoke] Adjacency from spoke end:`, this.walkableGraph.adjacency.get(spokeEndNodeId));
                                console.log(`[spoke] Adjacency from anchor:`, this.walkableGraph.adjacency.get(anchorNodeId));
                            }
                        } else {
                            console.log(`[spoke] WARNING: Could not find spoke end node near (${spokeOuterEnd.x.toFixed(0)}, ${spokeOuterEnd.y.toFixed(0)})`);
                        }
                    }

                    if (path.length === 0) {
                        console.log('[spoke] No path constructed');
                        this.spokes.push({ strand: null, angle: targetAngle, anchorPoint: this.spokeAnchorPoint });
                        return;
                    }
                    console.log(`[spoke] Total path: ${path.length} steps, via spoke angle ${(bestSpoke.angle * 180 / Math.PI).toFixed(1)}°`);
                    for (let pi = 0; pi < path.length; pi++) {
                        const ps = path[pi];
                        console.log(`[spoke]   step ${pi}: ${ps.walkable.type} from (${ps.fromNode.x.toFixed(0)},${ps.fromNode.y.toFixed(0)}) to (${ps.toNode.x.toFixed(0)},${ps.toNode.y.toFixed(0)})`);
                    }

                    this.currentWalkPath = path;
                    this.currentWalkStepIndex = 0;
                    this.walkStepProgress = 0;

                    // Start the spoke silk from the center
                    const spokeStart = this.thirdStrand.segments[0];
                    this.spokeStrand = new DraggedSilk(spokeStart.x, spokeStart.y);
                    this.spokeStrand.segments[0] = spokeStart;
                    this.spokeStrand.spiderAttached = true;
                    this.spokeStrand.explicitConnections.add(0);
                    silkStrands.push(this.spokeStrand);
                    this.spokeLastSegCount = 1;

                    this.state = 'walking_to_anchor';

                } else if (this.state === 'walking_to_anchor') {
                    if (!this.currentWalkPath || this.currentWalkStepIndex >= this.currentWalkPath.length) {
                        // Reached the anchor
                        this.state = 'tying_spoke_anchor';
                        this.tying = true;
                        this.tyingTimer = 0;
                        return;
                    }

                    const step = this.currentWalkPath[this.currentWalkStepIndex];
                    this.walkStepProgress += 0.015;

                    if (this.walkStepProgress >= 1.0) {
                        this.walkStepProgress = 0;
                        this.currentWalkStepIndex++;

                        if (this.currentWalkStepIndex >= this.currentWalkPath.length) {
                            // Arrived at anchor
                            this.x = this.spokeAnchorPoint.x;
                            this.y = this.spokeAnchorPoint.y;
                            this.state = 'tying_spoke_anchor';
                            this.tying = true;
                            this.tyingTimer = 0;
                        }
                        return;
                    }

                    // Interpolate position along the current step
                    const walkable = step.walkable;

                    if (walkable.type === 'strand' && walkable.ref && walkable.ref.segments) {
                        // Walk along actual strand segments (follows the real sag)
                        const strand = walkable.ref;
                        const segments = strand.segments;

                        // Find the segment indices closest to fromNode and toNode
                        // (using current positions, not stale graph-build positions)
                        let fromIdx = 0, toIdx = segments.length - 1;
                        let bestFromDist = Infinity, bestToDist = Infinity;
                        for (let i = 0; i < segments.length; i++) {
                            const seg = segments[i];
                            const df = Math.hypot(step.fromNode.x - seg.x, step.fromNode.y - seg.y);
                            const dt = Math.hypot(step.toNode.x - seg.x, step.toNode.y - seg.y);
                            if (df < bestFromDist) { bestFromDist = df; fromIdx = i; }
                            if (dt < bestToDist) { bestToDist = dt; toIdx = i; }
                        }

                        // Walk from fromIdx toward toIdx
                        const dir = fromIdx < toIdx ? 1 : -1;
                        const stepCount = Math.abs(toIdx - fromIdx);

                        if (stepCount === 0) {
                            // Same segment — just stay there
                            this.x = segments[fromIdx].x;
                            this.y = segments[fromIdx].y;
                        } else {
                            // Compute cumulative distances along the walk direction
                            let totalWalkDist = 0;
                            for (let i = fromIdx; i !== toIdx; i += dir) {
                                const s1 = segments[i];
                                const s2 = segments[i + dir];
                                totalWalkDist += Math.hypot(s2.x - s1.x, s2.y - s1.y);
                            }

                            // Find position at walkStepProgress along the cumulative distance
                            const targetDist = this.walkStepProgress * totalWalkDist;
                            let accumulated = 0;
                            let placed = false;
                            for (let i = fromIdx; i !== toIdx; i += dir) {
                                const s1 = segments[i];
                                const s2 = segments[i + dir];
                                const segDist = Math.hypot(s2.x - s1.x, s2.y - s1.y);
                                if (accumulated + segDist >= targetDist) {
                                    const t = segDist > 0 ? (targetDist - accumulated) / segDist : 0;
                                    this.x = s1.x + (s2.x - s1.x) * t;
                                    this.y = s1.y + (s2.y - s1.y) * t;
                                    placed = true;
                                    break;
                                }
                                accumulated += segDist;
                            }
                            if (!placed) {
                                this.x = segments[toIdx].x;
                                this.y = segments[toIdx].y;
                            }
                        }

                        // Apply spider weight to nearest segment
                        let closestIdx = fromIdx;
                        let closestDist = Infinity;
                        for (let i = Math.min(fromIdx, toIdx); i <= Math.max(fromIdx, toIdx); i++) {
                            const d = Math.hypot(segments[i].x - this.x, segments[i].y - this.y);
                            if (d < closestDist) { closestDist = d; closestIdx = i; }
                        }
                        if (!segments[closestIdx].fixed) {
                            segments[closestIdx].vy += this.weight;
                        }
                    } else {
                        // Branch or proximity: straight-line interpolation
                        const fromX = step.fromNode.x;
                        const fromY = step.fromNode.y;
                        const toX = step.toNode.x;
                        const toY = step.toNode.y;
                        this.x = fromX + (toX - fromX) * this.walkStepProgress;
                        this.y = fromY + (toY - fromY) * this.walkStepProgress;
                    }

                    // Add segments to the spoke silk as the spider walks
                    if (this.spokeStrand && this.spokeStrand.spiderAttached) {
                        const totalSteps = this.currentWalkPath.length;
                        const overallProgress = (this.currentWalkStepIndex + this.walkStepProgress) / totalSteps;
                        const desiredSegs = Math.floor(overallProgress * 40) + 1;
                        while (this.spokeStrand.segments.length < desiredSegs) {
                            this.spokeStrand.addSegment();
                        }
                        this.spokeStrand.updateTipPosition(this.x, this.y);
                    }

                } else if (this.state === 'tying_spoke_anchor') {
                    this.tyingTimer++;
                    this.legAnimation = Math.sin(this.tyingTimer * 0.2) * 0.5 + 0.5;
                    this.x = this.spokeAnchorPoint.x;
                    this.y = this.spokeAnchorPoint.y;

                    if (this.spokeStrand && this.spokeStrand.spiderAttached) {
                        this.spokeStrand.updateTipPosition(this.x, this.y);
                    }

                    if (this.tyingTimer > 60) {
                        this.tying = false;

                        // Attach the spoke at the anchor point
                        if (this.spokeStrand) {
                            const tip = this.spokeStrand.getTip();
                            tip.x = this.spokeAnchorPoint.x;
                            tip.y = this.spokeAnchorPoint.y;
                            tip.fixed = true;
                            this.spokeStrand.attached = true;
                            this.spokeStrand.spiderAttached = false;
                            this.spokeStrand.explicitConnections.add(this.spokeStrand.segments.length - 1);
                        }

                        this.state = 'tensioning_spoke';
                        this.tyingTimer = 0;
                        this.tying = true;
                    }

                } else if (this.state === 'tensioning_spoke') {
                    this.tyingTimer++;
                    this.legAnimation = Math.sin(this.tyingTimer * 0.2) * 0.5 + 0.5;

                    this.x = this.spokeAnchorPoint.x;
                    this.y = this.spokeAnchorPoint.y;

                    if (this.spokeStrand) {
                        const start = this.spokeStrand.segments[0];
                        const end = this.spokeStrand.segments[this.spokeStrand.segments.length - 1];
                        const dx = end.x - start.x;
                        const dy = end.y - start.y;
                        const straightDist = Math.sqrt(dx * dx + dy * dy);

                        let threadLength = 0;
                        for (let i = 0; i < this.spokeStrand.segments.length - 1; i++) {
                            const s1 = this.spokeStrand.segments[i];
                            const s2 = this.spokeStrand.segments[i + 1];
                            const segDx = s2.x - s1.x;
                            const segDy = s2.y - s1.y;
                            threadLength += Math.sqrt(segDx * segDx + segDy * segDy);
                        }

                        const targetLength = straightDist + this.spokeStrand.segmentLength;

                        if (threadLength > targetLength && this.spokeStrand.segments.length > 3) {
                            const removeIdx = Math.floor(this.spokeStrand.segments.length / 2);
                            this.spokeStrand.segments.splice(removeIdx, 1);
                        } else {
                            this.tying = false;
                            this.state = 'walking_spoke_to_center';
                            this.walkProgress = 1.0;
                        }
                    }

                } else if (this.state === 'walking_spoke_to_center') {
                    this.walkProgress -= 0.015;

                    if (this.walkProgress <= 0) {
                        this.walkProgress = 0;
                        const connectionSeg = this.thirdStrand.segments[0];
                        this.x = connectionSeg.x;
                        this.y = connectionSeg.y;
                        this.state = 'tying_spoke_center';
                        this.tying = true;
                        this.tyingTimer = 0;
                    } else if (this.spokeStrand) {
                        const idx = Math.floor(this.walkProgress * (this.spokeStrand.segments.length - 1));
                        const nextIdx = Math.min(idx + 1, this.spokeStrand.segments.length - 1);
                        const t = (this.walkProgress * (this.spokeStrand.segments.length - 1)) - idx;

                        const s1 = this.spokeStrand.segments[idx];
                        const s2 = this.spokeStrand.segments[nextIdx];

                        this.x = s1.x + (s2.x - s1.x) * t;
                        this.y = s1.y + (s2.y - s1.y) * t;

                        if (!s1.fixed) {
                            s1.vy += this.weight * (1 - t);
                        }
                        if (!s2.fixed) {
                            s2.vy += this.weight * t;
                        }
                    }

                } else if (this.state === 'tying_spoke_center') {
                    this.tyingTimer++;
                    this.legAnimation = Math.sin(this.tyingTimer * 0.2) * 0.5 + 0.5;

                    const connectionSeg = this.thirdStrand.segments[0];
                    this.x = connectionSeg.x;
                    this.y = connectionSeg.y;

                    if (this.tyingTimer > 60) {
                        this.tying = false;

                        // Register the new spoke
                        const centerX = connectionSeg.x;
                        const centerY = connectionSeg.y;
                        const angle = Math.atan2(
                            this.spokeAnchorPoint.y - centerY,
                            this.spokeAnchorPoint.x - centerX
                        );
                        this.spokes.push({
                            strand: this.spokeStrand,
                            angle: angle,
                            anchorPoint: { ...this.spokeAnchorPoint }
                        });

                        this.spokeStrand = null;
                        this.spokeAnchorPoint = null;
                        this.waitTimer = 0;
                        this.state = 'spoke_pause';
                    }

                } else if (this.state === 'spoke_pause') {
                    const connectionSeg = this.thirdStrand.segments[0];
                    this.x = connectionSeg.x;
                    this.y = connectionSeg.y;

                    this.waitTimer++;
                    if (this.waitTimer > 30) {
                        this.waitTimer = 0;
                        this.state = 'plan_next_spoke';
                    }

                } else if (this.state === 'all_spokes_complete') {
                    const connectionSeg = this.thirdStrand.segments[0];
                    this.x = connectionSeg.x;
                    this.y = connectionSeg.y;

                    this.waitTimer++;
                    if (this.waitTimer > 60) {
                        this.waitTimer = 0;
                        this.state = 'start_spiral';
                    }

                // ==================== Spiral States ====================

                } else if (this.state === 'start_spiral') {
                    const connectionSeg = this.thirdStrand.segments[0];
                    this.x = connectionSeg.x;
                    this.y = connectionSeg.y;

                    this.spiralSpokes = this.spokes.filter(s => s.strand !== null && s.strand.segments && s.strand.segments.length >= 2);
                    this.spiralSpokes.sort((a, b) => a.angle - b.angle);

                    if (this.spiralSpokes.length < 3) {
                        this.state = 'spiral_complete';
                        return;
                    }

                    this.spiralCurrentSpokeIndex = 0;
                    this.spiralRadius = 0.08;
                    this.spiralPerSpokeIncrement = 0.006;
                    this.spiralArcs = [];
                    this.spiralWalkProgress = 0;

                    console.log(`[spiral] Starting spiral with ${this.spiralSpokes.length} spokes`);
                    this.state = 'spiral_walk_outward';

                } else if (this.state === 'spiral_walk_outward') {
                    // Walk outward on current spoke from center to spiralRadius
                    const spoke = this.spiralSpokes[this.spiralCurrentSpokeIndex];
                    this.spiralWalkProgress += 0.025;

                    if (this.spiralWalkProgress > this.spiralRadius) {
                        this.spiralWalkProgress = this.spiralRadius;
                    }

                    const pos = this.getSpokePosition(spoke, this.spiralWalkProgress);
                    if (pos) {
                        this.x = pos.x;
                        this.y = pos.y;
                        if (pos.segment && !pos.segment.fixed) {
                            pos.segment.vy += this.weight;
                        }
                    }

                    if (this.spiralWalkProgress >= this.spiralRadius) {
                        this.state = 'spiral_create_arc';
                    }

                } else if (this.state === 'spiral_create_arc') {
                    // Create dragged thread and decide step vs walk+pull
                    const spoke = this.spiralSpokes[this.spiralCurrentSpokeIndex];
                    const pos = this.getSpokePosition(spoke, this.spiralRadius);
                    if (pos) {
                        this.x = pos.x;
                        this.y = pos.y;
                    }

                    this.spiralNextSpokeIndex = (this.spiralCurrentSpokeIndex + 1) % this.spiralSpokes.length;
                    this.spiralNextRadius = this.spiralRadius + this.spiralPerSpokeIncrement;

                    if (this.spiralNextRadius > this.spiralMaxRadius) {
                        this.state = 'spiral_complete';
                        return;
                    }

                    const nextSpoke = this.spiralSpokes[this.spiralNextSpokeIndex];
                    const nextPos = this.getSpokePosition(nextSpoke, this.spiralNextRadius);

                    if (!nextPos || nextPos.atEnd) {
                        this.spiralRadius = this.spiralNextRadius;
                        this.spiralCurrentSpokeIndex = this.spiralNextSpokeIndex;
                        this.spiralWalkProgress = this.spiralRadius - this.spiralPerSpokeIncrement;
                        this.state = 'spiral_walk_outward';
                        return;
                    }

                    // Create dragged thread arc
                    const gap = Math.hypot(nextPos.x - this.x, nextPos.y - this.y);
                    this.spiralCurrentArc = new DraggedSilk(this.x, this.y);
                    this.spiralCurrentArc.segments[0].fixed = false;
                    this.spiralCurrentArc.spiderAttached = true;
                    this.spiralCurrentArc.explicitConnections.add(0);
                    silkStrands.push(this.spiralCurrentArc);

                    // Connect arc start to current spoke via WebNode
                    if (pos && pos.segment) {
                        const node = new WebNode(
                            this.spiralCurrentArc.segments[0], this.spiralCurrentArc, 0,
                            pos.segment, spoke.strand, pos.segIdx
                        );
                        webNodes.push(node);
                    }

                    this.spiralStepTo = {
                        x: nextPos.x, y: nextPos.y,
                        segment: nextPos.segment, segIdx: nextPos.segIdx,
                        spoke: nextSpoke
                    };

                    if (gap <= this.spiralBridgeDistance) {
                        // Small gap: step across directly while dragging thread
                        this.spiralStepFrom = { x: this.x, y: this.y };
                        this.spiralStepProgress = 0;
                        this.state = 'spiral_stepping';
                    } else {
                        // Large gap: walk to next spoke via existing web, dragging thread
                        this.spiralWalkProgress = this.spiralRadius;
                        this.spiralPrevRingRadius = this.spiralRadius - (this.spiralPerSpokeIncrement * this.spiralSpokes.length);
                        if (this.spiralPrevRingRadius < 0.05) this.spiralPrevRingRadius = 0.05;
                        this.releaseTimer = 0;
                        this.state = 'spiral_drag_inward';
                    }

                } else if (this.state === 'spiral_stepping') {
                    // Small gap: step across, dragging thread behind
                    this.spiralStepProgress += 0.03;

                    if (this.spiralCurrentArc && this.spiralCurrentArc.spiderAttached) {
                        const totalGap = Math.hypot(
                            this.spiralStepTo.x - this.spiralStepFrom.x,
                            this.spiralStepTo.y - this.spiralStepFrom.y
                        );
                        const desiredSegs = Math.max(3, Math.ceil(totalGap / 12));
                        const targetSegs = Math.floor(this.spiralStepProgress * desiredSegs) + 1;
                        while (this.spiralCurrentArc.segments.length < targetSegs + 1) {
                            this.spiralCurrentArc.addSegment();
                        }
                        this.spiralCurrentArc.updateTipPosition(this.x, this.y);
                    }

                    if (this.spiralStepProgress >= 1.0) {
                        this.x = this.spiralStepTo.x;
                        this.y = this.spiralStepTo.y;

                        this.finalizeSpiralArc();

                        this.spiralCurrentSpokeIndex = this.spiralNextSpokeIndex;
                        this.spiralRadius = this.spiralNextRadius;
                        this.spiralWalkProgress = this.spiralRadius;

                        this.spiralTensionArc = this.spiralArcs[this.spiralArcs.length - 1].strand;
                        this.spiralPostTensionState = 'spiral_tying_spoke';
                        this.state = 'spiral_tensioning';
                        this.tyingTimer = 0;
                    } else {
                        this.x = this.spiralStepFrom.x + (this.spiralStepTo.x - this.spiralStepFrom.x) * this.spiralStepProgress;
                        this.y = this.spiralStepFrom.y + (this.spiralStepTo.y - this.spiralStepFrom.y) * this.spiralStepProgress;
                    }

                } else if (this.state === 'spiral_drag_inward') {
                    // Walk inward on current spoke while dragging thread
                    const spoke = this.spiralSpokes[this.spiralCurrentSpokeIndex];
                    this.spiralWalkProgress -= 0.025;

                    const pos = this.getSpokePosition(spoke, Math.max(this.spiralWalkProgress, 0.01));
                    if (pos) {
                        this.x = pos.x;
                        this.y = pos.y;
                        if (pos.segment && !pos.segment.fixed) {
                            pos.segment.vy += this.weight;
                        }
                    }

                    // Add segments to dragged thread as spider walks
                    this.releaseTimer++;
                    if (this.releaseTimer % 3 === 0 && this.spiralCurrentArc) {
                        this.spiralCurrentArc.addSegment();
                    }
                    if (this.spiralCurrentArc) {
                        this.spiralCurrentArc.updateTipPosition(this.x, this.y);
                    }

                    if (this.spiralWalkProgress <= this.spiralPrevRingRadius) {
                        this.spiralWalkProgress = Math.max(this.spiralPrevRingRadius, 0.01);

                        const prevArc = this.findPreviousArc(this.spiralCurrentSpokeIndex, this.spiralNextSpokeIndex);
                        if (prevArc) {
                            this.spiralWalkArcStrand = prevArc.strand;
                            this.spiralWalkArcProgress = 0;
                            this.state = 'spiral_drag_along_arc';
                        } else {
                            // No previous arc — walk through center to next spoke
                            if (this.spiralWalkProgress > 0.02) {
                                this.spiralPrevRingRadius = 0.01;
                            } else {
                                this.spiralCurrentSpokeIndex = this.spiralNextSpokeIndex;
                                this.spiralRadius = this.spiralNextRadius;
                                this.spiralWalkProgress = 0.01;
                                this.state = 'spiral_drag_outward';
                            }
                        }
                    }

                } else if (this.state === 'spiral_drag_along_arc') {
                    // Walk along previous ring's arc while dragging thread
                    this.spiralWalkArcProgress += 0.04;

                    // Add segments to dragged thread
                    this.releaseTimer++;
                    if (this.releaseTimer % 3 === 0 && this.spiralCurrentArc) {
                        this.spiralCurrentArc.addSegment();
                    }

                    if (this.spiralWalkArcProgress >= 1.0) {
                        this.spiralCurrentSpokeIndex = this.spiralNextSpokeIndex;
                        this.spiralRadius = this.spiralNextRadius;
                        this.spiralWalkProgress = this.spiralPrevRingRadius;
                        this.state = 'spiral_drag_outward';
                    } else if (this.spiralWalkArcStrand) {
                        const segs = this.spiralWalkArcStrand.segments;
                        const idx = Math.floor(this.spiralWalkArcProgress * (segs.length - 1));
                        const nextIdx = Math.min(idx + 1, segs.length - 1);
                        const t = (this.spiralWalkArcProgress * (segs.length - 1)) - idx;

                        this.x = segs[idx].x + (segs[nextIdx].x - segs[idx].x) * t;
                        this.y = segs[idx].y + (segs[nextIdx].y - segs[idx].y) * t;

                        if (!segs[idx].fixed) {
                            segs[idx].vy += this.weight * (1 - t);
                        }
                        if (!segs[nextIdx].fixed) {
                            segs[nextIdx].vy += this.weight * t;
                        }
                    }

                    if (this.spiralCurrentArc) {
                        this.spiralCurrentArc.updateTipPosition(this.x, this.y);
                    }

                } else if (this.state === 'spiral_drag_outward') {
                    // Walk outward on next spoke to new radius, dragging thread
                    const spoke = this.spiralSpokes[this.spiralCurrentSpokeIndex];
                    this.spiralWalkProgress += 0.025;

                    // Add segments to dragged thread
                    this.releaseTimer++;
                    if (this.releaseTimer % 3 === 0 && this.spiralCurrentArc) {
                        this.spiralCurrentArc.addSegment();
                    }

                    const pos = this.getSpokePosition(spoke, this.spiralWalkProgress);
                    if (pos) {
                        this.x = pos.x;
                        this.y = pos.y;
                        if (pos.segment && !pos.segment.fixed) {
                            pos.segment.vy += this.weight;
                        }
                    }

                    if (this.spiralCurrentArc) {
                        this.spiralCurrentArc.updateTipPosition(this.x, this.y);
                    }

                    if (this.spiralWalkProgress >= this.spiralRadius) {
                        this.spiralWalkProgress = this.spiralRadius;
                        // Refresh target — spoke may have shifted during walk
                        const nextPos = this.getSpokePosition(spoke, this.spiralRadius);
                        if (nextPos && nextPos.segment) {
                            this.spiralPullSegment = nextPos.segment;
                            this.spiralPullOriginalX = nextPos.segment.x;
                            this.spiralPullOriginalY = nextPos.segment.y;
                            this.spiralStepTo = {
                                x: nextPos.x, y: nextPos.y,
                                segment: nextPos.segment, segIdx: nextPos.segIdx,
                                spoke: spoke
                            };
                        }
                        this.spiralPullProgress = 0;
                        this.state = 'spiral_pull_inward';
                    }

                } else if (this.state === 'spiral_pull_inward') {
                    // Pull the spoke segment toward center
                    this.spiralPullProgress += 0.02;
                    const centerSeg = this.thirdStrand.segments[0];

                    if (this.spiralPullSegment) {
                        const t = Math.min(this.spiralPullProgress, 1.0);
                        // Pull ~40% toward center
                        this.spiralPullSegment.x = this.spiralPullOriginalX + (centerSeg.x - this.spiralPullOriginalX) * t * 0.4;
                        this.spiralPullSegment.y = this.spiralPullOriginalY + (centerSeg.y - this.spiralPullOriginalY) * t * 0.4;
                        // Spider follows the segment
                        this.x = this.spiralPullSegment.x;
                        this.y = this.spiralPullSegment.y;
                    }

            attachBridgeToStart() {

            attachSecondStrand() {

                        tip.y = thread0End.y;
                        tip.fixed = true;
                        tip.vx = 0;
                        tip.vy = 0;

            attachFourthStrand() {

                        tip.y = thread0CenterSeg.y;

                        tip.vx = 0;
                        tip.vy = 0;

            initializeSpokes() {

                const connectionSeg = this.thirdStrand.segments[0];
                const centerX = connectionSeg.x;
                const centerY = connectionSeg.y;

                this.spokes = [];

                // thread1a: from center toward bridge start
                if (this.thread1a) {
                    const endSeg = this.thread1a.segments[0];
                    const angle = Math.atan2(endSeg.y - centerY, endSeg.x - centerX);

                    const angle = Math.atan2(endSeg.y - centerY, endSeg.x - centerX);
                    this.spokes.push({ strand: this.thread1b, angle, anchorPoint: { x: endSeg.x, y: endSeg.y } });
                }

                // thread2 (rappel): from center down to branch
                if (this.thirdStrand) {

                    const angle = Math.atan2(endSeg.y - centerY, endSeg.x - centerX);
                    this.spokes.push({ strand: this.thirdStrand, angle, anchorPoint: { x: endSeg.x, y: endSeg.y } });
                }

                // thread3 (fourthStrand): from center toward bridge center (runs alongside thread1a)
                if (this.fourthStrand) {
                    const endSeg = this.fourthStrand.segments[this.fourthStrand.segments.length - 1];
                    const angle = Math.atan2(endSeg.y - centerY, endSeg.x - centerX);
                    this.spokes.push({ strand: this.fourthStrand, angle, anchorPoint: { x: endSeg.x, y: endSeg.y } });

            getSpokePosition(spoke, progress) {
                const strand = spoke.strand;
                if (!strand || !strand.segments || strand.segments.length < 2) return null;

                const segments = strand.segments;
                const centerSeg = this.thirdStrand.segments[0];

                const dStart = Math.hypot(segments[0].x - centerSeg.x, segments[0].y - centerSeg.y);
                const dEnd = Math.hypot(segments[segments.length - 1].x - centerSeg.x, segments[segments.length - 1].y - centerSeg.y);

                const centerIdx = dStart < dEnd ? 0 : segments.length - 1;
                const outerIdx = dStart < dEnd ? segments.length - 1 : 0;
                const dir = centerIdx < outerIdx ? 1 : -1;

                let totalDist = 0;
                for (let i = centerIdx; i !== outerIdx; i += dir) {
                    totalDist += Math.hypot(segments[i + dir].x - segments[i].x, segments[i + dir].y - segments[i].y);
                }

                const targetDist = progress * totalDist;
                let accumulated = 0;

                for (let i = centerIdx; i !== outerIdx; i += dir) {
                    const s1 = segments[i];
                    const s2 = segments[i + dir];
                    const segDist = Math.hypot(s2.x - s1.x, s2.y - s1.y);

                    if (accumulated + segDist >= targetDist) {
                        const t = segDist > 0 ? (targetDist - accumulated) / segDist : 0;
                        return {
                            x: s1.x + (s2.x - s1.x) * t,
                            y: s1.y + (s2.y - s1.y) * t,
                            segment: s1,
                            segIdx: i,
                            t: t,
                            atEnd: false
                        };
                    }
                    accumulated += segDist;
                }

                return {
                    x: segments[outerIdx].x,
                    y: segments[outerIdx].y,
                    segment: segments[outerIdx],
                    segIdx: outerIdx,
                    t: 0,
                    atEnd: true
                };
            }

            finalizeSpiralArc() {
                if (!this.spiralCurrentArc) return;

                const arc = this.spiralCurrentArc;
                const tip = arc.getTip();

                if (this.spiralStepTo && this.spiralStepTo.segment) {
                    tip.x = this.spiralStepTo.segment.x;
                    tip.y = this.spiralStepTo.segment.y;

                    const tipIdx = arc.segments.length - 1;
                    const node = new WebNode(
                        tip, arc, tipIdx,
                        this.spiralStepTo.segment, this.spiralStepTo.spoke.strand, this.spiralStepTo.segIdx

                    webNodes.push(node);
                    arc.explicitConnections.add(tipIdx);

                arc.attached = true;
                arc.spiderAttached = false;
                tip.fixed = false;

                this.spiralArcs.push({
                    strand: arc,
                    fromSpokeIdx: this.spiralCurrentSpokeIndex,
                    toSpokeIdx: this.spiralNextSpokeIndex,
                    radius: this.spiralRadius
                });

            }

            findPreviousArc(fromSpokeIdx, toSpokeIdx) {
                for (let i = this.spiralArcs.length - 1; i >= 0; i--) {
                    const arc = this.spiralArcs[i];
                    if (arc.fromSpokeIdx === fromSpokeIdx && arc.toSpokeIdx === toSpokeIdx) {
                        return arc;
                    }
                }
                return null;
            }

            draw() {
                if (this.tying) {
                    ctx.strokeStyle = '#000000';
                    ctx.lineWidth = 1;

                    const leftAngle1 = -Math.PI / 4 + this.legAnimation * 0.5;
                    const leftAngle2 = -Math.PI / 3 - this.legAnimation * 0.8;
                    const leftJointX = this.x + Math.cos(leftAngle1) * 8;
                    const leftJointY = this.y + Math.sin(leftAngle1) * 8;
                    const leftEndX = leftJointX + Math.cos(leftAngle1 + leftAngle2) * 6;
                    const leftEndY = leftJointY + Math.sin(leftAngle1 + leftAngle2) * 6;

                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(leftJointX, leftJointY);
                    ctx.lineTo(leftEndX, leftEndY);
                    ctx.stroke();

                    const rightAngle1 = -Math.PI / 4 - this.legAnimation * 0.5;
                    const rightAngle2 = -Math.PI / 3 + this.legAnimation * 0.8;
                    const rightJointX = this.x + Math.cos(rightAngle1) * 8;
                    const rightJointY = this.y + Math.sin(rightAngle1) * 8;
                    const rightEndX = rightJointX + Math.cos(rightAngle1 + rightAngle2) * 6;
                    const rightEndY = rightJointY + Math.sin(rightAngle1 + rightAngle2) * 6;

                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(rightJointX, rightJointY);
                    ctx.lineTo(rightEndX, rightEndY);

                ctx.fillStyle = '#000000';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        function generateBranches() {
            branches = [];
            const seedX = width * (0.25 + Math.random() * 0.5);
            const seedY = height - 10;
            const leftBranch = generateBranchSide(seedX, seedY, -1);
            branches.push(leftBranch);
            const rightBranch = generateBranchSide(seedX, seedY, 1);
            branches.push(rightBranch);
        }
        
        function generateBranchSide(startX, startY, direction) {
            const segments = 6;
            const baseThickness = 12;
            let currentX = startX;
            let currentY = startY;
            let currentAngle = -45;
            const mainBranch = new Branch(currentX, currentY, currentX, currentY, baseThickness, 0);
            let currentBranch = mainBranch;
            
            for (let i = 0; i < segments; i++) {
                const segmentLength = 90 + Math.random() * 50;
                const thickness = baseThickness - (i * 1.5);
                const zigzag = (Math.random() - 0.5) * 30;
                currentAngle += zigzag;
                currentAngle = Math.max(-85, Math.min(-15, currentAngle));
                const angleRad = (currentAngle * Math.PI) / 180;
                const newX = currentX + Math.cos(angleRad) * segmentLength * direction;
                const newY = currentY + Math.sin(angleRad) * segmentLength;
                const boundedX = Math.max(50, Math.min(width - 50, newX));
                const boundedY = Math.max(50, newY);
                const segment = new Branch(currentX, currentY, boundedX, boundedY, thickness, i + 1);
                currentBranch.addChild(segment);
                
                if (i > 1 && i < segments - 1 && Math.random() > 0.5) {
                    addTwig(currentX, currentY, currentAngle, thickness * 0.6, direction);
                }
                
                currentX = boundedX;
                currentY = boundedY;
                currentBranch = segment;
                if (currentY < 100) break;
            }
            
            return mainBranch;
            
            function addTwig(x, y, baseAngle, thickness, dir) {
                const twigAngle = baseAngle + (Math.random() > 0.5 ? 1 : -1) * (30 + Math.random() * 30);
                const twigLength = 30 + Math.random() * 30;
                const angleRad = (twigAngle * Math.PI) / 180;
                const twigX = x + Math.cos(angleRad) * twigLength * dir;
                const twigY = y + Math.sin(angleRad) * twigLength;
                const twig = new Branch(x, y, twigX, twigY, thickness, 10);
                currentBranch.addChild(twig);
                
                if (Math.random() > 0.7) {
                    const subTwigAngle = twigAngle + (Math.random() - 0.5) * 40;
                    const subTwigLength = 20 + Math.random() * 20;
                    const subAngleRad = (subTwigAngle * Math.PI) / 180;
                    const subTwigX = twigX + Math.cos(subAngleRad) * subTwigLength * dir;
                    const subTwigY = twigY + Math.sin(subAngleRad) * subTwigLength;
                    const subTwig = new Branch(twigX, twigY, subTwigX, subTwigY, thickness * 0.7, 11);
                    twig.addChild(subTwig);

        }
        
        function createSpider() {
            if (branches.length > 0) {
                const leftBranch = branches[0];
                let segmentCount = 0;
                let sixthSegment = null;
                
                function findSegment(branch) {
                    if (branch.generation > 0) {
                        segmentCount++;
                        if (segmentCount === 6) {
                            sixthSegment = branch;
                            return true;
                        }
                    }
                    for (let child of branch.children) {
                        if (child.generation <= 6) {
                            if (findSegment(child)) return true;
                        }
                    }
                    return false;
                }
                
                findSegment(leftBranch);
                
                if (sixthSegment) {
                    const midX = (sixthSegment.x1 + sixthSegment.x2) / 2;
                    const midY = (sixthSegment.y1 + sixthSegment.y2) / 2;
                    spider = new Spider(midX, midY);
                } else {
                    const forkX = branches[0].x1;
                    const forkY = branches[0].y1;
                    spider = new Spider(forkX, forkY - 15);
                }
            }
        }
        
        function startWeaving() {
            if (spider) {
                spider.startWeaving();
            }
        }
        
        function draw() {
            ctx.fillStyle = '#f5f5dc';
            ctx.fillRect(0, 0, width, height);
            branches.forEach(branch => branch.draw());
            silkStrands.forEach(strand => strand.draw());
            
            webNodes.forEach(node => node.draw());
            
            if (spider) {
                spider.draw();
            }
        }
        
        function animate() {
            updateWebConnections();
            
            // Update physics for all segments
            silkStrands.forEach(strand => {
                if (strand instanceof FloatedSilk) {
                    if (strand.attached) {
                        for (let seg of strand.segments) {
                            if (!seg.fixed) {
                                seg.vy += 0.02;
                            }

                    for (let seg of strand.segments) {
                        seg.update(!strand.attached);

                        if (!seg.fixed) {
                            seg.vy += 0.02;

                    for (let seg of strand.segments) {
                        seg.update(false);

                        if (!spiderSeg.fixed) {

                        }
                    }
                } else if (strand instanceof RappelSilk) {
                    for (let seg of strand.segments) {
                        if (!seg.fixed) {
                            seg.vy += 0.02;
                        }
                    }
                    for (let seg of strand.segments) {
                        seg.update(false);
                    }
                    
                    if (spider && strand.spiderHanging) {
                        const tip = strand.getTip();
                        if (!tip.fixed) {
                            tip.vy += spider.weight;
                        }
                    }
                }

            // Global constraint solving for all threads
            for (let iter = 0; iter < 30; iter++) {
                for (let strand of silkStrands) {
                    for (let i = 0; i < strand.segments.length - 1; i++) {
                        const s1 = strand.segments[i];
                        const s2 = strand.segments[i + 1];
                        const dx = s2.x - s1.x;
                        const dy = s2.y - s1.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist === 0) continue;
                        
                        const diff = (strand.segmentLength - dist) / dist;
                        const offsetX = dx * diff * 0.7;
                        const offsetY = dy * diff * 0.7;
                        
                        if (!s1.fixed) {
                            s1.x -= offsetX;
                            s1.y -= offsetY;
                        }
                        if (!s2.fixed) {
                            s2.x += offsetX;
                            s2.y += offsetY;
                        }
                    }
                }
                
                // Zero velocities on fixed segments
                for (let strand of silkStrands) {
                    for (let seg of strand.segments) {

                            seg.vy = 0;
                        }
