<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider Web Weaving</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #f5f5dc;
            font-family: Arial, sans-serif;
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100vh;
        }
        
        .controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(60, 60, 60, 0.9);
            padding: 15px;
            border-radius: 8px;
            color: #f5f5dc;
            max-width: 300px;
        }
        
        button {
            background: #3c3c3c;
            color: #f5f5dc;
            border: 2px solid #2a2a2a;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
        }
        
        button:hover {
            background: #2a2a2a;
        }
        
        .instructions {
            font-size: 12px;
            margin-top: 10px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="controls">
        <div>Spider Web Simulator</div>
        <button onclick="regenerate()">Regenerate Branches</button>
        <button onclick="startWeaving()">Start Web</button>
        <div class="instructions">Click "Start Web" to begin</div>
        <div style="margin-top: 15px;">
            <label>
                <input type="checkbox" id="windToggle" checked>
                Wind: <span id="windStatus">On</span>
            </label>
        </div>
        <div id="debugInfo" style="margin-top: 15px; font-size: 11px; opacity: 0.9; border-top: 1px solid #555; padding-top: 10px;">
            Debug info will appear here...
        </div>
    </div>
    <canvas id="canvas"></canvas>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let branches = [];
        let spider;
        let silkStrands = [];
        let windEnabled = true;
        let windLevel = 1;
        let windForce = { x: 0.1, y: 0.01 };
        let webNodes = [];
        
        function updateWindForce() {
            windForce.x = (windLevel / 10) * 0.125;
            windForce.y = (windLevel / 10) * 0.0125;
        }
        
        function resizeCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        
        class WebNode {
            constructor(segment1, strand1, segmentIndex1, segment2, strand2, segmentIndex2) {
                this.segment1 = segment1;
                this.strand1 = strand1;
                this.segmentIndex1 = segmentIndex1;
                this.segment2 = segment2;
                this.strand2 = strand2;
                this.segmentIndex2 = segmentIndex2;
                this.active = true;
                
                segment1.connectedNodes.push(this);
                segment2.connectedNodes.push(this);
            }
            
            update() {
                if (!this.active) return;
                
                if (!this.segment1 || !this.segment2) {
                    this.active = false;
                    return;
                }
                
                const avgX = (this.segment1.x + this.segment2.x) / 2;
                const avgY = (this.segment1.y + this.segment2.y) / 2;
                
                if (!this.segment1.fixed && !this.segment2.fixed) {
                    this.segment1.x = avgX;
                    this.segment1.y = avgY;
                    this.segment2.x = avgX;
                    this.segment2.y = avgY;
                } else if (!this.segment1.fixed) {
                    this.segment1.x = this.segment2.x;
                    this.segment1.y = this.segment2.y;
                } else if (!this.segment2.fixed) {
                    this.segment2.x = this.segment1.x;
                    this.segment2.y = this.segment1.y;
                }
            }
            
            draw() {
                if (!this.active || !this.segment1 || !this.segment2) return;
                
                ctx.fillStyle = '#8B4513';
                ctx.beginPath();
                ctx.arc(this.segment1.x, this.segment1.y, 3, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // ==================== WalkableGraph ====================
        // Graph abstraction over all walkable surfaces (silk strands + branches)
        // Used for pathfinding so the spider can walk to anchor points

        class WalkableGraph {
            constructor() {
                this.nodes = []; // [{id, x, y, type, ref}]
                this.edges = []; // [{from, to, distance, walkable: {type, ref, startIdx, endIdx}}]
                this.adjacency = new Map(); // nodeId -> [{toId, edgeIdx}]
            }

            addNode(x, y, type, ref = null) {
                const id = this.nodes.length;
                this.nodes.push({ id, x, y, type, ref });
                this.adjacency.set(id, []);
                return id;
            }

            addEdge(fromId, toId, distance, walkable) {
                const idx = this.edges.length;
                this.edges.push({ from: fromId, to: toId, distance, walkable });
                this.adjacency.get(fromId).push({ toId, edgeIdx: idx });
                this.adjacency.get(toId).push({ toId: fromId, edgeIdx: idx });
            }

            findNearestNode(x, y, maxDist = 30) {
                let best = -1;
                let bestDist = maxDist;
                for (const node of this.nodes) {
                    const dx = node.x - x;
                    const dy = node.y - y;
                    const d = Math.sqrt(dx * dx + dy * dy);
                    if (d < bestDist) {
                        bestDist = d;
                        best = node.id;
                    }
                }
                return best;
            }

            findShortestPath(fromId, toId, excludeNodes = null) {
                if (fromId < 0 || toId < 0) return null;

                const dist = new Array(this.nodes.length).fill(Infinity);
                const prev = new Array(this.nodes.length).fill(-1);
                const prevEdge = new Array(this.nodes.length).fill(-1);
                const visited = new Set();
                // Pre-mark excluded nodes as visited so they're never expanded
                if (excludeNodes) {
                    for (const id of excludeNodes) {
                        if (id !== fromId && id !== toId) visited.add(id);
                    }
                }

                dist[fromId] = 0;

                // Simple priority queue via sorted array (graph is small)
                const pq = [{ id: fromId, d: 0 }];

                while (pq.length > 0) {
                    pq.sort((a, b) => a.d - b.d);
                    const { id: u } = pq.shift();

                    if (visited.has(u)) continue;
                    visited.add(u);

                    if (u === toId) break;

                    for (const { toId: v, edgeIdx } of this.adjacency.get(u)) {
                        if (visited.has(v)) continue;
                        const edge = this.edges[edgeIdx];
                        const newDist = dist[u] + edge.distance;
                        if (newDist < dist[v]) {
                            dist[v] = newDist;
                            prev[v] = u;
                            prevEdge[v] = edgeIdx;
                            pq.push({ id: v, d: newDist });
                        }
                    }
                }

                if (dist[toId] === Infinity) return null;

                // Reconstruct path as WalkSteps
                const path = [];
                let cur = toId;
                while (cur !== fromId) {
                    const edge = this.edges[prevEdge[cur]];
                    const fromNode = this.nodes[prev[cur]];
                    const toNode = this.nodes[cur];
                    path.unshift({
                        walkable: edge.walkable,
                        fromNode: fromNode,
                        toNode: toNode,
                        distance: edge.distance
                    });
                    cur = prev[cur];
                }

                return path;
            }

            build(allStrands, allBranches, convergencePoint) {
                this.nodes = [];
                this.edges = [];
                this.adjacency = new Map();

                const nodeMap = new Map(); // "x,y" -> nodeId (for deduplication)
                const SNAP = 8; // snap distance for merging nearby points

                const getOrCreateNode = (x, y, type, ref) => {
                    // Check for existing nearby node
                    for (const node of this.nodes) {
                        const dx = node.x - x;
                        const dy = node.y - y;
                        if (Math.sqrt(dx * dx + dy * dy) < SNAP) {
                            return node.id;
                        }
                    }
                    return this.addNode(x, y, type, ref);
                };

                // Add convergence point
                const centerNodeId = getOrCreateNode(
                    convergencePoint.x, convergencePoint.y, 'center', null
                );

                // Add strand endpoints and compute strand edge distances
                for (const strand of allStrands) {
                    if (!strand.segments || strand.segments.length < 2) continue;
                    if (strand instanceof FloatedSilk && !strand.attached) continue;
                    if (strand instanceof DraggedSilk && !strand.attached) continue;
                    if (strand instanceof RappelSilk && !strand.attached) continue;

                    const startSeg = strand.segments[0];
                    const endSeg = strand.segments[strand.segments.length - 1];

                    const startId = getOrCreateNode(startSeg.x, startSeg.y, 'strand_endpoint', strand);
                    const endId = getOrCreateNode(endSeg.x, endSeg.y, 'strand_endpoint', strand);

                    // Compute total walking distance along strand
                    let totalDist = 0;
                    for (let i = 0; i < strand.segments.length - 1; i++) {
                        const s1 = strand.segments[i];
                        const s2 = strand.segments[i + 1];
                        const dx = s2.x - s1.x;
                        const dy = s2.y - s1.y;
                        totalDist += Math.sqrt(dx * dx + dy * dy);
                    }

                    if (startId !== endId) {
                        this.addEdge(startId, endId, totalDist, {
                            type: 'strand',
                            ref: strand,
                            startIdx: 0,
                            endIdx: strand.segments.length - 1
                        });
                    }
                }

                // Add branch edges (recursive)
                const addBranchEdges = (branch) => {
                    const startId = getOrCreateNode(branch.x1, branch.y1, 'branch_point', branch);
                    const endId = getOrCreateNode(branch.x2, branch.y2, 'branch_point', branch);

                    const dx = branch.x2 - branch.x1;
                    const dy = branch.y2 - branch.y1;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (startId !== endId && dist > 0) {
                        this.addEdge(startId, endId, dist, {
                            type: 'branch',
                            ref: branch,
                            startIdx: 0,
                            endIdx: 1
                        });
                    }

                    for (const child of branch.children) {
                        addBranchEdges(child);
                    }
                };

                for (const branch of allBranches) {
                    addBranchEdges(branch);
                }

                // Connect strand endpoints to the branches they sit on.
                // A strand endpoint at (px, py) may land in the middle of a branch
                // segment, not at a branch node. Project it onto every branch edge
                // and insert it into the branch path if close enough.
                const projectOnBranch = (px, py, branch) => {
                    const dx = branch.x2 - branch.x1;
                    const dy = branch.y2 - branch.y1;
                    const len2 = dx * dx + dy * dy;
                    if (len2 === 0) return null;
                    let t = ((px - branch.x1) * dx + (py - branch.y1) * dy) / len2;
                    t = Math.max(0, Math.min(1, t));
                    const projX = branch.x1 + dx * t;
                    const projY = branch.y1 + dy * t;
                    const dist = Math.hypot(px - projX, py - projY);
                    return { dist, t, branch, projX, projY };
                };

                const allBranchSegments = [];
                const collectBranches = (branch) => {
                    const dx = branch.x2 - branch.x1;
                    const dy = branch.y2 - branch.y1;
                    if (dx * dx + dy * dy > 1) allBranchSegments.push(branch);
                    for (const child of branch.children) collectBranches(child);
                };
                for (const b of allBranches) collectBranches(b);

                for (const node of this.nodes) {
                    if (node.type !== 'strand_endpoint' && node.type !== 'center') continue;

                    for (const branch of allBranchSegments) {
                        const proj = projectOnBranch(node.x, node.y, branch);
                        if (!proj || proj.dist > 15) continue;

                        // Find the graph nodes for this branch's endpoints
                        const bStartId = this.findNearestNode(branch.x1, branch.y1, SNAP + 1);
                        const bEndId = this.findNearestNode(branch.x2, branch.y2, SNAP + 1);

                        if (bStartId >= 0 && bStartId !== node.id) {
                            const d = Math.hypot(node.x - this.nodes[bStartId].x, node.y - this.nodes[bStartId].y);
                            const alreadyConnected = this.adjacency.get(node.id).some(e => e.toId === bStartId);
                            if (!alreadyConnected) {
                                this.addEdge(node.id, bStartId, d, {
                                    type: 'branch', ref: branch, startIdx: 0, endIdx: 1
                                });
                            }
                        }
                        if (bEndId >= 0 && bEndId !== node.id) {
                            const d = Math.hypot(node.x - this.nodes[bEndId].x, node.y - this.nodes[bEndId].y);
                            const alreadyConnected = this.adjacency.get(node.id).some(e => e.toId === bEndId);
                            if (!alreadyConnected) {
                                this.addEdge(node.id, bEndId, d, {
                                    type: 'branch', ref: branch, startIdx: 0, endIdx: 1
                                });
                            }
                        }
                    }
                }

                // Also add general proximity edges for very close nodes
                const PROXIMITY = 15;
                for (let i = 0; i < this.nodes.length; i++) {
                    for (let j = i + 1; j < this.nodes.length; j++) {
                        const ni = this.nodes[i];
                        const nj = this.nodes[j];
                        const d = Math.hypot(ni.x - nj.x, ni.y - nj.y);
                        if (d < PROXIMITY) {
                            const alreadyConnected = this.adjacency.get(i).some(e => e.toId === j);
                            if (!alreadyConnected) {
                                this.addEdge(i, j, d, {
                                    type: 'proximity',
                                    ref: null,
                                    startIdx: 0,
                                    endIdx: 0
                                });
                            }
                        }
                    }
                }

                return centerNodeId;
            }
        }

        // ==================== AnchorFinder ====================
        // Find anchor points on branches or strands by ray-casting from center

        function findAnchorOnBranchOrStrand(centerX, centerY, angle, allBranches, allStrands) {
            const rayDx = Math.cos(angle);
            const rayDy = Math.sin(angle);
            const RAY_LENGTH = 2000;

            let bestHit = null;
            let bestDist = Infinity;

            // Helper: test ray against a line segment (x1,y1)-(x2,y2)
            const testSegment = (x1, y1, x2, y2, sourceRef, sourceType) => {
                const bdx = x2 - x1;
                const bdy = y2 - y1;

                const denom = rayDx * bdy - rayDy * bdx;
                if (Math.abs(denom) < 0.001) return; // parallel

                const t = ((x1 - centerX) * bdy - (y1 - centerY) * bdx) / denom;
                const u = ((x1 - centerX) * rayDy - (y1 - centerY) * rayDx) / denom;

                if (t > 20 && t < RAY_LENGTH && u >= 0 && u <= 1) {
                    if (t < bestDist) {
                        bestDist = t;
                        const hitX = centerX + rayDx * t;
                        const hitY = centerY + rayDy * t;
                        bestHit = { x: hitX, y: hitY, source: sourceRef, sourceType: sourceType, u: u };
                    }
                }
            };

            // Check all branch segments (recursive)
            const checkBranch = (branch) => {
                testSegment(branch.x1, branch.y1, branch.x2, branch.y2, branch, 'branch');
                for (const child of branch.children) checkBranch(child);
            };
            for (const branch of allBranches) {
                checkBranch(branch);
            }

            // Check all attached strands — test each actual segment pair so we hit
            // the real (sagging) strand geometry, not a straight line between endpoints
            for (const strand of allStrands) {
                if (!strand.segments || strand.segments.length < 2) continue;
                if (strand instanceof FloatedSilk && !strand.attached) continue;
                if (strand instanceof DraggedSilk && !strand.attached) continue;
                if (strand instanceof RappelSilk && !strand.attached) continue;

                for (let i = 0; i < strand.segments.length - 1; i++) {
                    const s1 = strand.segments[i];
                    const s2 = strand.segments[i + 1];
                    testSegment(s1.x, s1.y, s2.x, s2.y, strand, 'strand');
                }
            }

            // For strand hits, snap to the nearest actual segment point
            if (bestHit && bestHit.sourceType === 'strand') {
                const strand = bestHit.source;
                let closestDist = Infinity;
                let closestIdx = 0;
                for (let i = 0; i < strand.segments.length; i++) {
                    const seg = strand.segments[i];
                    const dx = seg.x - bestHit.x;
                    const dy = seg.y - bestHit.y;
                    const d = dx * dx + dy * dy;
                    if (d < closestDist) {
                        closestDist = d;
                        closestIdx = i;
                    }
                }
                bestHit.x = strand.segments[closestIdx].x;
                bestHit.y = strand.segments[closestIdx].y;
                bestHit.segmentIndex = closestIdx;
            }

            return bestHit;
        }

        // Find largest angular gap between existing spokes and return bisection angle
        function findLargestSpokeGap(spokes) {
            if (spokes.length < 2) return 0;

            const angles = spokes.map(s => s.angle).sort((a, b) => a - b);

            let maxGap = 0;
            let bisectAngle = 0;

            for (let i = 0; i < angles.length; i++) {
                const next = (i + 1) % angles.length;
                let gap;
                if (next === 0) {
                    // Wrap-around gap
                    gap = (2 * Math.PI) - angles[angles.length - 1] + angles[0];
                } else {
                    gap = angles[next] - angles[i];
                }

                if (gap > maxGap) {
                    maxGap = gap;
                    if (next === 0) {
                        bisectAngle = angles[angles.length - 1] + gap / 2;
                        if (bisectAngle > Math.PI) bisectAngle -= 2 * Math.PI;
                    } else {
                        bisectAngle = angles[i] + gap / 2;
                    }
                }
            }

            return bisectAngle;
        }

        function findIntersections(strand1, strand2) {
            const nodes = [];
            const threshold = 8;
            
            const strand1CanStick = strand1.canStick !== false;
            const strand2CanStick = strand2.canStick !== false;
            
            for (let i = 0; i < strand1.segments.length; i++) {
                const seg1 = strand1.segments[i];
                
                const seg1Allowed = strand1CanStick || 
                                   (strand1.explicitConnections && strand1.explicitConnections.has(i));
                
                if (!seg1Allowed) continue;
                
                if (strand1 instanceof DraggedSilk && !strand1.attached) continue;
                
                for (let j = 0; j < strand2.segments.length; j++) {
                    const seg2 = strand2.segments[j];
                    
                    const seg2Allowed = strand2CanStick || 
                                       (strand2.explicitConnections && strand2.explicitConnections.has(j));
                    
                    if (!seg2Allowed) continue;
                    
                    if (strand2 instanceof DraggedSilk && !strand2.attached) continue;
                    
                    if (strand1.canStick && strand1 instanceof FloatedSilk && !strand1.attached) {
                        if (i !== strand1.segments.length - 1) continue;
                    }
                    if (strand2.canStick && strand2 instanceof FloatedSilk && !strand2.attached) {
                        if (j !== strand2.segments.length - 1) continue;
                    }
                    
                    const dx = seg2.x - seg1.x;
                    const dy = seg2.y - seg1.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < threshold) {
                        const alreadyExists = webNodes.some(node => 
                            (node.segment1 === seg1 && node.segment2 === seg2) ||
                            (node.segment1 === seg2 && node.segment2 === seg1)
                        );
                        
                        if (!alreadyExists) {
                            const node = new WebNode(seg1, strand1, i, seg2, strand2, j);
                            nodes.push(node);
                        }
                    }
                }
            }
            
            return nodes;
        }
        
        function updateWebConnections() {
            webNodes = webNodes.filter(node => node.active);
            
            for (let i = 0; i < silkStrands.length; i++) {
                for (let j = i + 1; j < silkStrands.length; j++) {
                    const newNodes = findIntersections(silkStrands[i], silkStrands[j]);
                    webNodes.push(...newNodes);
                }
            }
            
            for (let node of webNodes) {
                node.update();
            }
        }
        
        class SilkSegment {
            constructor(x, y, hasInitialVelocity = false) {
                this.x = x;
                this.y = y;
                this.vx = hasInitialVelocity ? 2 : 0;
                this.vy = hasInitialVelocity ? 0 : 0;
                this.fixed = false;
                this.connectedNodes = [];
            }
            
            update(applyWind = false) {
                if (this.fixed) return;
                
                if (applyWind && windEnabled) {
                    this.vx += windForce.x;
                    this.vy += windForce.y;
                }
                this.vx *= 0.98;
                this.vy *= 0.98;
                this.x += this.vx;
                this.y += this.vy;
            }
        }
        
        class FloatedSilk {
            constructor(startX, startY) {
                this.segments = [new SilkSegment(startX, startY, true)];
                this.segments[0].fixed = true;
                this.maxSegments = 80;
                this.segmentLength = 10;
                this.attached = false;
                this.tightening = false;
                this.targetLength = null;
                this.canStick = true;
            }
            
            addSegment() {
                if (this.segments.length >= this.maxSegments) return false;
                const last = this.segments[this.segments.length - 1];
                const newSeg = new SilkSegment(last.x + 5, last.y, false);
                this.segments.push(newSeg);
                return true;
            }
            
            getTip() {
                return this.segments[this.segments.length - 1];
            }
            
            attach(x, y) {
                const tip = this.getTip();
                tip.x = x;
                tip.y = y;
                tip.fixed = true;
                this.attached = true;
                
                let totalDist = 0;
                for (let i = 0; i < this.segments.length - 1; i++) {
                    const s1 = this.segments[i];
                    const s2 = this.segments[i + 1];
                    const dx = s2.x - s1.x;
                    const dy = s2.y - s1.y;
                    totalDist += Math.sqrt(dx * dx + dy * dy);
                }
                this.targetLength = totalDist * 0.8;
                this.tightening = true;
            }
            
            update() {
                if (this.attached) {
                    for (let seg of this.segments) {
                        if (!seg.fixed) {
                            seg.vy += 0.02;
                        }
                    }
                }
                
                for (let seg of this.segments) {
                    seg.update(!this.attached);
                }
                
                for (let iter = 0; iter < 15; iter++) {
                    for (let i = 0; i < this.segments.length - 1; i++) {
                        const s1 = this.segments[i];
                        const s2 = this.segments[i + 1];
                        const dx = s2.x - s1.x;
                        const dy = s2.y - s1.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist === 0) continue;
                        
                        const diff = (this.segmentLength - dist) / dist;
                        const offsetX = dx * diff * 0.9;
                        const offsetY = dy * diff * 0.9;
                        
                        if (!s1.fixed) {
                            s1.x -= offsetX;
                            s1.y -= offsetY;
                        }
                        if (!s2.fixed) {
                            s2.x += offsetX;
                            s2.y += offsetY;
                        }
                    }
                }
                
                if (this.tightening && this.attached) {
                    const start = this.segments[0];
                    const end = this.segments[this.segments.length - 1];
                    const dx = end.x - start.x;
                    const dy = end.y - start.y;
                    const currentDist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (currentDist > this.targetLength) {
                        for (let i = 1; i < this.segments.length - 1; i++) {
                            const t = i / (this.segments.length - 1);
                            const targetX = start.x + dx * t;
                            const targetY = start.y + dy * t;
                            const seg = this.segments[i];
                            seg.x += (targetX - seg.x) * 0.05;
                            seg.y += (targetY - seg.y) * 0.05;
                        }
                    } else {
                        this.tightening = false;
                    }
                }
            }
            
            draw() {
                ctx.strokeStyle = '#3c3c3c';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(this.segments[0].x, this.segments[0].y);
                for (let i = 1; i < this.segments.length; i++) {
                    ctx.lineTo(this.segments[i].x, this.segments[i].y);
                }
                ctx.stroke();
                
                ctx.fillStyle = '#FF0000';
                for (let i = 0; i < this.segments.length; i++) {
                    ctx.beginPath();
                    ctx.arc(this.segments[i].x, this.segments[i].y, 2, 0, Math.PI * 2);
                    ctx.fill();

        class Branch {
            constructor(x1, y1, x2, y2, thickness, generation = 0) {
                this.x1 = x1;
                this.y1 = y1;
                this.x2 = x2;
                this.y2 = y2;
                this.thickness = thickness;
                this.generation = generation;
                this.children = [];
            }
            
            draw() {
                ctx.strokeStyle = '#3c3c3c';
                ctx.lineWidth = this.thickness;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(this.x1, this.y1);
                ctx.lineTo(this.x2, this.y2);
                ctx.stroke();
                this.children.forEach(child => child.draw());
            }
            
            addChild(branch) {
                this.children.push(branch);
            }
            
            checkCollision(px, py, radius = 5) {
                const dx = this.x2 - this.x1;
                const dy = this.y2 - this.y1;
                const length = Math.sqrt(dx * dx + dy * dy);
                const nx = dx / length;
                const ny = dy / length;
                const vx = px - this.x1;
                const vy = py - this.y1;
                const dot = vx * nx + vy * ny;
                const t = Math.max(0, Math.min(length, dot));
                const closestX = this.x1 + nx * t;
                const closestY = this.y1 + ny * t;
                const distX = px - closestX;
                const distY = py - closestY;
                const dist = Math.sqrt(distX * distX + distY * distY);
                
                if (dist < this.thickness / 2 + radius) {
                    return { x: closestX, y: closestY };
                }
                
                for (let child of this.children) {
                    const collision = child.checkCollision(px, py, radius);
                    if (collision) return collision;
                }
                return null;
            }
        }

                            this.bridgeStrand.segments.splice(removeIdx, 1);

                            this.tyingTimer = 0;
                        }

                } else if (this.state === 'tying_start') {

                        this.tying = true;

                        this.secondStrand.segments[0].y = thread0Start.y;

                        this.x = s1.x + (s2.x - s1.x) * t;
                        this.y = s1.y + (s2.y - s1.y) * t;
                        
                        if (!s1.fixed) {

                        const nextIdx = Math.min(idx + 1, this.secondStrand.segments.length - 1);
                        const t = (this.thread1Progress * (this.secondStrand.segments.length - 1)) - idx;
                        
                        const s1 = this.secondStrand.segments[idx];
                        const s2 = this.secondStrand.segments[nextIdx];
                        
                        this.x = s1.x + (s2.x - s1.x) * t;
                        this.y = s1.y + (s2.y - s1.y) * t;
